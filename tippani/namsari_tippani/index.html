    <script>
    let state = { apps: [], mrtks: [], lands: [], mohis: [], areas: {}, };

    let landRevenueMaster = null;

// Function to fetch the master data
async function loadRevenueMasterData() {
    try {
        const response = await fetch('/tool/land_revenue_master_data.json');
        landRevenueMaster = await response.json();
        console.log("Revenue data loaded successfully");
        update(); // Refresh preview once data is loaded
    } catch (error) {
        console.error("Error loading revenue JSON:", error);
    }
}
// state मा purchasePrices थप्ने
if (!state.purchasePrices) state.purchasePrices = {};

function renderPurchaseUI() {
    const cont = document.getElementById('purchase_inputs_container');
    const list = document.getElementById('purchase_kitta_list');
    const chk = document.getElementById('chk_purchase_price');
    
    if (!chk || !cont || !list) return; // सुरक्षाको लागि

    const isChecked = chk.checked;
    cont.style.display = isChecked ? 'block' : 'none';
    
    if (!isChecked) return;

    // state मा purchasePrices अब्जेक्ट छैन भने बनाउने
    if (!state.purchasePrices) state.purchasePrices = {};

    let html = "";
    if (state.lands.length === 0) {
        html = "<div style='color:red; font-size:11px;'>पहिले जग्गा विवरण थप्नुहोस्।</div>";
    } else {
        state.lands.forEach(l => {
            l.ks.forEach(k => {
                const id = `${l.vdc}_${l.ward}_${k}`;
                const val = state.purchasePrices[id] || "";

    function toNep(num) {
        if (num === "" || num === undefined) return "";
        return num.toString().replace(/\d/g, d => "०१२३४५६७८९"[d]).replace(/\./g, "।");
    }
    function toNepNum(num) {
    if (num === "" || num === undefined || num === null) return "";
    return num.toString().replace(/\d/g, d => "०१२३४५६७८९"[d]);
}

    function n2e(str) {
        if (!str) return 0;
        let eng = str.toString().replace(/[०-९]/g, d => "0123456789"["०१२३४५६७८९".indexOf(d)]);
        return parseFloat(eng) || 0;
    }

    function nepJoin(arr) {
        let localArr = [...arr];
        if (!localArr.length) return "";
        if (localArr.length === 1) return localArr[0];
        const last = localArr.pop();
        return localArr.join(', ') + ' र ' + last;
    }

        let n = Math.floor(num);

        const crore = Math.floor(n / 10000000); n %= 10000000;

function calculateLiveTotal(id, rate) {
    // पहिले अंकलाई नेपाली बनाउने
    const nepRate = rate.replace(/\d/g, d => "०१२३४५६७८९"[d]);
    state.areas[id].rate = nepRate;
    
    // यो लाइनको नयाँ टोटल निकाल्ने
    const singleTotal = calculateSingleRowTotal(state.areas[id]);
    
    // केवल यो सेलको भ्यालु मात्र फेर्ने (यसो गर्दा इनपुट बक्स रि-रेन्डर हुँदैन र फोकस रहिरहन्छ)
    document.getElementById(`row_total_${id}`).innerText = toNep(singleTotal);
    
    // कुल थैली (Grand Total) पनि अपडेट गर्ने
    updateGrandTotalDisp();
    update(); // मुख्य टिप्पणी पनि अपडेट गर्ने
}

// २. एउटा कित्ताको मात्र थैली निकाल्ने लजिक
function calculateSingleRowTotal(a) {
    let decRopani = 0;
    if (a.sqm) {
        decRopani = n2e(a.sqm) / 508.72;
    } else {
        decRopani = n2e(a.r) + (n2e(a.a)/16) + (n2e(a.p)/64) + (n2e(a.d)/256);
    }
    return Math.ceil(n2e(a.rate) * decRopani);
}

    let grandTotal = 0;
    for (let key in state.areas) {
        grandTotal += calculateSingleRowTotal(state.areas[key]);
    }
    document.getElementById('total_thaili_disp').innerText = toNep(grandTotal);
}

function update() {
    // १. आधारभूत सेटिङ र डेटा
    const v = (id) => document.getElementById(id)?.value || ".......";
    const settings = JSON.parse(localStorage.getItem('global_office_settings')) || { 
        gov: "नेपाल सरकार", ministry: "भूमि व्यवस्था, सहकारी, संघीय मामिला तथा सामान्य प्रशासन मन्त्रालय", dept: "भूमि व्यवस्थापन तथा अभिले विभाग", 
        office: "भूमि प्रशासन कार्यालय", addr: "चौतारा, सिन्धुपाल्चोक", def_dist: "सिन्धुपाल्चोक" 
    };

    // साइडबार लिस्ट अपडेट
    document.getElementById('list_apps').innerHTML = state.apps.map((x, i) => `<div class="item-list">${x.name}<span class="del-btn" onclick="state.apps.splice(${i},1);update();">×</span></div>`).join('');
    document.getElementById('list_mrtks').innerHTML = state.mrtks.map((x, i) => `<div class="item-list">${x.name}<span class="del-btn" onclick="state.mrtks.splice(${i},1);update();">×</span></div>`).join('');
    document.getElementById('list_lands').innerHTML = state.lands.map((x, i) => `<div class="item-list">${x.vdc}-${x.ward}: ${x.ks.join(',')}<span class="del-btn" onclick="state.lands.splice(${i},1);update();">×</span></div>`).join('');

    // २. कुल थैली अंक हिसाब
// --- १. अन्तिम थैली (Thaili) र विवरण (Prefix) निर्धारण ---
    let minValTotal = 0;       // न्यूनतम सरकारी मुल्यांकनको जोड
    let calculatedThaili = 0;  // खरिद मुल्य + बाँकी कित्ताको सरकारी मूल्य
    let kitasWithPurchase = []; // खरिद मुल्य भरिएका कित्ताहरू
    
    state.lands.forEach(l => {
        l.ks.forEach(k => {
            const id = `${l.vdc}_${l.ward}_${k}`;
            const minVal = calculateSingleRowTotal(state.areas[id]); // सरकारी न्यूनतम मूल्य
            minValTotal += minVal;

            const pPrice = n2e(state.purchasePrices ? state.purchasePrices[id] : 0); 
            if (pPrice > 0) {
                kitasWithPurchase.push(k);
                calculatedThaili += pPrice;
            } else {
                calculatedThaili += minVal;
            }
        });
    });

    // म्यानुअल कुल खरिद मूल्य (Top Manual Input Box)
    const manualTotal = n2e(document.getElementById('total_purchase_manual')?.value || 0);
    
// --- १. दुई प्रकारका थैली निर्धारण ---
    
    state.lands.forEach(l => {
        l.ks.forEach(k => {
            const id = `${l.vdc}_${l.ward}_${k}`;
            const minVal = calculateSingleRowTotal(state.areas[id]); 
            minValTotal += minVal; // टेबलको लागि सरकारी रेट जोड्दै जाने

            const pPrice = n2e(state.purchasePrices ? state.purchasePrices[id] : 0); 
            if (pPrice > 0) {
                kitasWithPurchase.push(k);
                calculatedThaili += pPrice;
            } else {
                calculatedThaili += minVal;
            }
        });
    });

    
    let finalThaili = 0; // राजस्व र व्यहोरामा प्रयोग हुने अन्तिम थैली
    let thailiPrefix = "";

    // लजिक: कुन ठुलो छ? (Manual vs Calculated vs Minimum)
    if (manualTotal > minValTotal) {
        finalThaili = manualTotal;
        thailiPrefix = `साविक जम्मा खरिद मुल्य समेतको आधारमा कायम भएको कुल थैली अंक रू. <b>${toNep(finalThaili)}</b> अक्षेरेपी <b>${numberToNepaliWords(finalThaili)}</b> रूपैयाँको `;
    } else if (calculatedThaili > minValTotal) {
        finalThaili = calculatedThaili;
        thailiPrefix = `कि.नं. <b>${nepJoin(kitasWithPurchase)}</b> का जग्गाहरूको खरिद मुल्य समेतको आधारमा कायम भएको कुल थैली अंक रू. <b>${toNep(finalThaili)}</b> अक्षेरेपी <b>${numberToNepaliWords(finalThaili)}</b> रूपैयाँको `;
    } else {
        finalThaili = minValTotal;
        thailiPrefix = `कुल थैली अंक रू. <b>${toNep(finalThaili)}</b> अक्षेरेपी <b>${numberToNepaliWords(finalThaili)}</b> रूपैयाँको `;
    }

    // --- २. राजस्व हिसाब (Based on finalThaili) ---
    let labhakarAmount = 0;
    if (landRevenueMaster && landRevenueMaster.rates) {
        const prov = document.getElementById('in_province').value;
        const relType = document.querySelector('input[name="rel_type"]:checked')?.value || "inside";
        const titleName = (relType === 'inside') ? "नामसारी (तीन पुस्ता भित्र)" : "नामसारी (तीन पुस्ता बाहिर)";
        const titleData = landRevenueMaster.rates[prov]?.[titleName];

        if (titleData) {
            const sewaRow = titleData.sewa?.find(r => {
                let fromNum = n2e(r.from), toNum = r.to === "" ? Infinity : n2e(r.to);
                return finalThaili >= fromNum && finalThaili <= toNum;
            });
            if (sewaRow) {
                let rateVal = n2e(sewaRow['rural']); 
                let finalSewa = (rateVal < 25) ? (finalThaili * rateVal / 100) : rateVal;
                document.getElementById('fee_s').value = toNepNum(Math.ceil(finalSewa));
            }
            if (relType === 'outside' && titleData.labhakar) {
                const holdType = document.querySelector('input[name="hold_type"]:checked')?.value || 'old';
                const labhaRow = titleData.labhakar.find(r => {
                    let fromNum = n2e(r.from), toNum = r.to === "" ? Infinity : n2e(r.to);
                    return finalThaili >= fromNum && finalThaili <= toNum;
                });
                if (labhaRow) labhakarAmount = Math.ceil(finalThaili * n2e(labhaRow[`rural_${holdType}`]) / 100);
            }
        }
    }

                const province = document.getElementById('in_province').value;
                const isHR = document.getElementById('chk_rec_house').checked; // घरबाटो टिक छ कि छैन


    // --- ३. अन्तिम feeText निर्माण ---
let feeParts = [];
    feeParts.push(`${province} प्रदेश आर्थिक ऐन बमोजिमको सेवा शुल्क रू. <b>${v('fee_s')}</b>`);
    if (document.getElementById('chk_late').checked) feeParts.push(`विलम्ब शुल्क रू. <b>${v('fee_l')}</b>`);
    if (labhakarAmount > 0) feeParts.push(`पुँजीगत लाभकर रू. <b>${toNep(labhakarAmount)}</b>`);

    let feeText = "";
    if (isHR) {
        // यहाँ 'thailiPrefix' ले खरिद मूल्यसहितको ठुलो थैली देखाउँछ
        feeText = thailiPrefix + nepJoin(feeParts);
    } else {
        feeText = nepJoin(feeParts);
    }
    // ५. जग्गा र अन्य विवरण तयार गर्ने
    const landFinal = nepJoin(state.lands.map(l => {
        let kits = l.ks.map(k => `<b>${k}</b>`); 
        return `साविक <b>${l.vdc}</b> वडा नं. <b>${l.ward}</b> को कि.नं. ${nepJoin(kits)}`;
    }));

    const gharbato = document.getElementById('chk_rec_house').checked ? `<b>${v('in_loc')} ${v('in_lw')}</b> नं. वडा कार्यालयको च.नं. <b>${v('hr_sc')}</b> मिति <b>${v('hr_sd')}</b> को घरबाटो सिफारिस` : "";
    
    let recText = "";
    const isN = document.getElementById('chk_rec_namsari').checked;
    const isH = document.getElementById('chk_rec_house').checked;
    if (isN) {
        if (!isH) recText = `<b>${v('in_loc')} ${v('in_lw')}</b> नं. वडा कार्यालयको च.नं. <b>${v('in_sc')}</b> मिति <b>${v('in_sd')}</b> को सिफारिस`;
        else recText = `<b>${v('in_loc')} ${v('in_lw')}</b> नं. वडा कार्यालयको च.नं. <b>${v('in_sc')}</b> मिति <b>${v('in_sd')}</b> को सिफारिस र सोही सिफारिसमा उल्लेख भएको घरबाटोको व्यहोरा`;
    }

    let mohiTextParts = [];
    if (document.getElementById('chk_mohi')?.checked) {
        state.mohis.forEach(m => {
            const kittaList = nepJoin(m.kittas.map(k => `<b>${toNep(k)}</b>`));
            mohiTextParts.push(m.name.trim() === "" ? `कि.नं. ${kittaList} मा मोही यथावत कायम राखी` : `कि.नं. ${kittaList} मा मोही <b>${m.name}</b> कायमै राखी`);
        });
    }
                const mohiFinalText = mohiTextParts.length > 0 ? " " + nepJoin(mohiTextParts) + " " : "";


    let activeApps = state.apps.filter(x => !x.renounce);
    let sons = state.apps.filter(x => x.type === 'son');
    let wives = state.apps.filter(x => x.type === 'wife');
    let decDts = state.mrtks.map(m => `<b>${m.rel} ${m.name}</b>को मिति <b>${m.dt}</b>`).join(' र ');
    let nijaText = state.mrtks.length > 1 ? "निजहरू" : "निज";
    let activeNamesOnly = nepJoin(activeApps.map(a => `<b>${a.name}</b>`));
    let nivedakKa = state.apps.length > 1 ? "निवेदकहरूको" : "निवेदकको";
    let haqNote = (state.haq_groups || []).map(g => `, हकदारहरू मध्येका <b>${nepJoin(g.names)}</b> ले द.नं. <b>${g.reg}</b> मिति <b>${g.dt}</b> को निवेदनबाट दिएको मञ्जुरी`).join(' र ');
    let hissaText = (document.getElementById('chk_hissa')?.checked) ? " को हकहिस्सा मात्र" : "";
    let guthiText = (document.getElementById('chk_guthi')?.checked) ? " <b>गुठी यथावत कायम राखी</b> " : "";

    // रजिष्ट्रेशन फाँटबाट भिडी आएको व्यहोरा देखाउन यो स्ट्रिङ प्रयोग गर्नुहोस्
let regPhaatNote = document.getElementById('chk_reg_fant').checked 
    ? "भनि रजिष्ट्रेशन फाँटबाट भिडी आएको" 
    : "";

    let totalThaili = finalThaili
        const extraIn = document.getElementById('in_extra').value.trim();
    let extrainfo =  (extraIn ? ` साथै ${extraIn}` : "");

    

    // ६. प्रिभ्यु टेबुल र बडी कन्टेन्ट
    let hrTableHtml = "";
    if (document.getElementById('chk_show_table').checked) {
        hrTableHtml = `${gharbato}को आधारमा देहाय बमोजिम न्युनत्तम मुल्याङ्कन कायम हुने ${regPhaatNote} ।<table class="doc-table"><tr><th>गा.वि.स.</th><th>कि.नं.</th><th>क्षेत्रफल</th><th>बाटोको प्रकार</th><th>वर्गिकरण</th><th>न्युनत्तम मुल्य</th></tr>`;
        state.lands.forEach(l => l.ks.forEach(k => {
            const a = state.areas[`${l.vdc}_${l.ward}_${k}`];
            if (!a) return;
            let fArea = a.sqm ? toNepNum(a.sqm) + " व.मि." : `${toNep(a.r||'०')}-${toNep(a.a||'०')}-${toNep(a.p||'०')}-${toNep(a.d||'०')}`;
            hrTableHtml += `<tr><td>${l.vdc}-${l.ward}</td><td>${k}</td><td>${fArea}</td><td>${a.path || '-'}</td><td>${a.cat || '-'}</td><td>${toNepNum(calculateSingleRowTotal(a))}</td></tr>`;
        }));
        hrTableHtml += `<tr><td colspan="5" style="text-align:right; padding-right:10px;"><b>कुल न्युनत्तम मुल्याङ्कन</b></td><td><b>${toNep(minValTotal)}</b></td></tr></table>`;
    }

    let headerHtml = `<table style="width: 100%; border-bottom: 2px double black; margin-bottom: 15px; border-collapse: collapse; border: none;"><tr>

        function renderMohiUI() {

            const allKittas = state.lands.flatMap(l => l.ks);

            if (allKittas.length === 0) {
                container.innerHTML = "<small color='red'>पहिले जग्गा विवरण थप्नुहोस्।</small>";
                return;
            }

            let html = `<div style="margin-top:10px; padding:5px; border:1px dashed #ca8a04;">
        <label>मोहीको नाम (खाली छोडे टिप्पणीमा मोहीको नाम आउँदैन):</label>
        <input type="text" id="temp_mohi_name" class="input-box" placeholder="मोहीको नाम">
        <label>कित्ताहरू छान्नुहोस्:</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; max-height:100px; overflow-y:auto; background:white; padding:5px; border:1px solid #ddd;">`;

            allKittas.forEach(k => {
                html += `<label style="font-weight:normal;"><input type="checkbox" class="mohi-kitta-chk" value="${k}"> कि.नं. ${k}</label>`;
            });

            html += `</div>
        <button onclick="addMohiEntry()" class="btn btn-dark" style="background:#ca8a04;">+ मोही विवरण थप्नुहोस्</button>
    </div>
    <div id="mohi_list_ui"></div>`;

            container.innerHTML = html;
            renderMohiList();
        }

        function addMohiEntry() {
            const nameInput = document.getElementById('temp_mohi_name');
            const name = nameInput ? nameInput.value : "";

            // Find all checkboxes that are checked
            const checkboxes = document.querySelectorAll('.mohi-kitta-chk:checked');
            const selectedKittas = Array.from(checkboxes).map(el => el.value);

            if (selectedKittas.length === 0) {
                alert("कृपया कम्तिमा एउटा कित्ता नम्बर छान्नुहोस् ।");
                return;
            }

            // Initialize if it doesn't exist
            if (!state.mohis) state.mohis = [];

            state.mohis.push({
                name: name,
                kittas: selectedKittas
            });

            // Reset input and UI
            if (nameInput) nameInput.value = "";

            // Clear checkmarks after adding
            checkboxes.forEach(cb => cb.checked = false);

            renderMohiList(); // Refresh the list of added mohis
            update();         // Refresh the document preview
            saveState();      // Save to local storage
        }

        function renderMohiList() {
            const listDiv = document.getElementById('mohi_list_ui');
            listDiv.innerHTML = state.mohis.map((m, i) => `
        <div class="item-list" style="background:#fef9c3">
            <span>${m.name ? m.name : 'यथावत'} (कि.नं. ${m.kittas.join(',')})</span>
            <span class="del-btn" onclick="state.mohis.splice(${i},1); renderMohiUI(); update();">×</span>
        </div>
    `).join('');
        }

        window.onload = () => {
    loadGlobalSettings(); // प्रदेश र नाता लोड गर्ने
        loadRevenueMasterData(); // <--- Add this line

    const saved = localStorage.getItem('namsari_v3_storage');
    if (saved) {
        const d = JSON.parse(saved); 
        state = d.state;
        
        // सबै इनपुटहरूको भ्यालु भर्ने
        for (let id in d.inputs) {
            const el = document.getElementById(id);
            if (el) { 
                if (el.type === 'checkbox') el.checked = d.inputs[id]; 
                else el.value = d.inputs[id]; 
            }
        }
    }
    
    // लोड भएपछि हराउन नदिन यी फङ्सनहरू अनिवार्य कल गर्नुपर्छ:
    renderAreaInputs();   // क्षेत्रफलको लिस्ट देखाउन
    toggleHouseRoad();    // घरबाटोको सिफारिस इनपुट देखाउन (यदि टिक छ भने)
    update();             // प्रिभ्यू अपडेट गर्न
    renderMohiUI();
        renderHaqUI();
        renderPurchaseUI()

}


        function saveState() {
            const inputs = {};
            document.querySelectorAll('.input-box, textarea, input[type="checkbox"]').forEach(el => { if (el.id) inputs[el.id] = (el.type === 'checkbox') ? el.checked : el.value; });
            localStorage.setItem('namsari_v3_storage', JSON.stringify({ state, inputs }));
        }
        function resetAll() { if (confirm("विवरण मेटाउने?")) { localStorage.removeItem('namsari_v3_storage'); location.reload(); } }
// नम्बर टाइप गर्दा नेपाली बनाउने फङ्सन
function nepalify(el) {
    el.value = el.value.replace(/\d/g, d => "०१२३४५६७८९"[d]).replace(/\./g, "।");
    update();
}

// फाइल एक्सपोर्ट फङ्सन (अन्तिमको हटाएर यो राख्नुहोस्)
function exportWord() {
    const content = document.getElementById('preview').innerHTML;
    const appName = state.apps.length > 0 ? state.apps[0].name.replace(/\s+/g, '_') : 'विवरण';
    
    const style = `
    <style>
        @page { size: A4; margin: 1cm 1cm 1cm 2.2cm; }
        body { font-family: 'Mukta', sans-serif; font-size: 14pt; }
        
        /* Word का लागि विशेष टेवल सेटिङ */
        table { 
            border-collapse: collapse; 
            width: 100%; 
            mso-table-lspace: 0pt; 
            mso-table-rspace: 0pt; 
        }
        
        .doc-table { 
            border: 1pt solid black; /* px को सट्टा pt प्रयोग गर्नुहोस् */
        }
        
        .doc-table th, .doc-table td { 
            border: 1pt solid black; 
            padding: 4px; 
            text-align: center; 
            font-size: 11pt;
            /* Word मा सिंगल लाइन नै आओस् भन्नका लागि यो प्रोपर्टी थप्नुहोस् */
            mso-border-alt: solid windowtext .5pt; 
        }
        
        p { text-align: justify; margin: 0 0 10pt 0; }
    </style>`;

    // बाहिरी लेआउट टेबलको बोर्डर पूर्ण रूपमा हटाउन यो रिप्लेसमेन्ट गर्नुहोस्
    let cleanContent = content.replace(/<table/g, '<table border="0" cellspacing="0" cellpadding="0"');
    // भित्री 'doc-table' का लागि बोर्डर १ बनाउनुहोस्
    cleanContent = cleanContent.replace(/class="doc-table"/g, 'class="doc-table" border="1"');

    const html = `<html><head><meta charset="utf-8">${style}</head><body>${cleanContent}</body></html>`;
    
    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `नामसारी_टिप्पणी_${appName}.doc`;
    a.click();
}

function resetAll() { 
    if (confirm("विवरण मेटाउने?")) { 
        localStorage.removeItem('namsari_v3_storage'); 
        location.reload(); 
    } 
}
