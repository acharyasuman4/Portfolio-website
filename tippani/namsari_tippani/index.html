<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नामसारी टिप्पणी प्रणाली - v3 (Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Mukta', sans-serif; background-color: #cbd5e1; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .main-layout { display: flex; height: 100vh; width: 100vw; }
        
        .input-panel { flex: 0 0 400px; background: white; padding: 15px; border-right: 1px solid #94a3b8; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 12px; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 2px; color: #475569; }
        .input-box { border: 1px solid #94a3b8; padding: 5px; border-radius: 4px; width: 100%; font-size: 13px; font-family: 'Mukta', sans-serif; margin-bottom: 5px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .btn { padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; color: white; font-size: 12px; width: 100%; margin-top: 5px; }
        .btn-blue { background-color: #2563eb; } .btn-red { background-color: #ef4444; } .btn-green { background-color: #16a34a; } .btn-dark { background-color: #334155; }
        
        .preview-container { flex: 1; background: #94a3b8; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .preview-page { background: white; width: 210mm; min-height: 297mm; padding: 1.5cm 1.5cm 1.5cm 2.5cm; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); text-align: justify; line-height: 1.6; font-size: 14pt; color: #000; }
        
        .doc-table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1.5px solid black; }
        .doc-table th, .doc-table td { border: 1px solid black; padding: 6px; text-align: center; font-size: 12pt; }
        .item-list { background: #f1f5f9; padding: 3px 6px; border-radius: 4px; font-size: 11px; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #cbd5e1; }
        .del-btn { color: red; cursor: pointer; font-weight: bold; margin-left: 10px; }

        @media print { .no-print { display: none !important; } .preview-container { display: block; background: white; padding: 0; } .preview-page { box-shadow: none; width: 100%; margin: 0; padding: 0; } }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="input-panel no-print">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="margin:0; font-size:1.1rem;">नामसारी टिप्पणी</h2>
            <button onclick="resetAll()" class="btn btn-red" style="width:auto; padding:4px 10px;">Reset All</button>
        </div>
        
        <div class="input-group">
            <div class="row-2">
                <div><label>द.नं.:</label><input type="text" id="in_rn" class="input-box" oninput="update()" autofocus></div>
                <div><label>द.मिति:</label><input type="text" id="in_rd" class="input-box" oninput="update()"></div>
            </div>
            <div class="row-2">
                <div><label>मि.नं.:</label><input type="text" id="in_mn" class="input-box" oninput="update()"></div>
                <div><label>मिति:</label><input type="text" id="in_dt" class="input-box" oninput="update()"></div>
            </div>
        </div>

        <div class="input-group" style="background:#eef2ff;">
            <label>१. निवेदक विवरण</label>
            <input type="text" id="app_name" placeholder="नाम थर" class="input-box">
            <div class="row-2">
                <select id="app_type" class="input-box" onchange="toggleLabels()">
                    <option value="son">बाबु/बाजे</option>
                    <option value="wife">पति/ससुरा</option>
                </select>
                <input type="text" id="app_f" placeholder="बाबुको नाम" class="input-box">
            </div>
            <input type="text" id="app_gf" placeholder="बाजेको नाम" class="input-box">
            <button onclick="addApp()" class="btn btn-blue">+ निवेदक थप्नुहोस्</button>
            <div id="list_apps"></div>
            
            <div style="margin-top:10px;">
                <label><input type="checkbox" id="chk_haq" onchange="renderHaqUI(); update();"> हक छोड्ने छ?</label>
                <div id="haq_inputs"></div>
            </div>
        </div>

        <div class="input-group" style="background:#fff1f2;">
            <label>२. मृतक विवरण</label>
            <input type="text" id="m_name" placeholder="मृतकको नाम" class="input-box">
            <div class="row-2">
                <input type="text" id="m_rel" placeholder="नाता" class="input-box">
                <input type="text" id="m_dt" placeholder="मृत्यु मिति" class="input-box">
            </div>
            <button onclick="addMrtk()" class="btn btn-red">+ मृतक थप्नुहोस्</button>
            <div id="list_mrtks"></div>
        </div>

        <div class="input-group" style="background:#f0fdf4;">
            <label>३. जग्गा विवरण</label>
            <div class="row-2">
                <input type="text" id="l_vdc" placeholder="साविक गा.वि.स." class="input-box">
                <input type="text" id="l_ward" placeholder="वडा" class="input-box">
            </div>
            <input type="text" id="l_kitta" placeholder="कि.नं." class="input-box">
            <div class="row-2">
                <button onclick="addLand('same')" class="btn btn-green">Same VDC</button>
                <button onclick="addLand('new')" class="btn btn-dark">New VDC</button>
            </div>
            <div id="list_lands"></div>
        </div>

        <div class="input-group">
            <div class="row-2">
                <input type="text" id="in_loc" placeholder="स्थानीय तह" class="input-box" oninput="update()">
                <input type="text" id="in_lw" placeholder="वडा नं." class="input-box" oninput="update()">
            </div>
            <div class="row-2">
                <input type="text" id="in_sc" placeholder="सि.च.नं." class="input-box" oninput="update()">
                <input type="text" id="in_sd" placeholder="सि.मिति" class="input-box" oninput="update()">
            </div>
            <textarea id="in_extra" placeholder="सनाखत साथै..." class="input-box" oninput="update()"></textarea>
            <div class="row-2">
                <input type="text" id="fee_s" value="२५००" class="input-box" oninput="update()">
                <label style="display:flex; align-items:center;"><input type="checkbox" id="chk_late" checked onchange="update()"> विलम्ब</label>
                <input type="text" id="fee_l" value="१००" class="input-box" oninput="update()">
            </div>
        </div>

        <button onclick="window.print()" class="btn btn-blue">🖨️ Print</button>
        <button onclick="exportWord()" class="btn btn-green">📄 Word Export</button>
    </div>

    <div class="preview-container">
        <div id="preview" class="preview-page"></div>
    </div>
</div>

<script>
    let state = { apps: [], mrtks: [], lands: [] };

    function toNep(num) {
        return num.toString().replace(/\d/g, d => "०१२३४५६७८९"[d]);
    }

    document.addEventListener('input', e => {
        if(e.target.type === 'text' || e.target.tagName === 'TEXTAREA') {
            e.target.value = e.target.value.replace(/\d/g, d => "०१२३४५६७८९"[d]);
        }
    });

    function toggleLabels() {
        const type = document.getElementById('app_type').value;
        document.getElementById('app_f').placeholder = type === 'wife' ? "पतिको नाम" : "बाबुको नाम";
        document.getElementById('app_gf').placeholder = type === 'wife' ? "ससुराको नाम" : "बाजेको नाम";
    }

    function addApp() {
        const name = document.getElementById('app_name').value;
        if(!name) return;
        state.apps.push({
            name,
            type: document.getElementById('app_type').value,
            f: document.getElementById('app_f').value,
            gf: document.getElementById('app_gf').value,
            renounce: false, r_reg: "", r_dt: ""
        });
        document.getElementById('app_name').value = "";
        renderHaqUI();
        update();
    }

    function addMrtk() {
        const name = document.getElementById('m_name').value;
        if(!name) return;
        state.mrtks.push({
            name,
            rel: document.getElementById('m_rel').value,
            dt: document.getElementById('m_dt').value
        });
        document.getElementById('m_name').value = "";
        update();
    }

    function addLand(mode) {
        const v = document.getElementById('l_vdc').value;
        const w = document.getElementById('l_ward').value;
        const k = document.getElementById('l_kitta').value;
        if(!k) return;
        let match = state.lands.find(x => x.vdc === v && x.ward === w);
        if(match) match.ks.push(k); else state.lands.push({ vdc: v, ward: w, ks: [k] });
        
        document.getElementById('l_kitta').value = "";
        if(mode === 'same') {
            document.getElementById('l_kitta').focus();
        } else {
            document.getElementById('l_vdc').value = "";
            document.getElementById('l_ward').value = "";
            document.getElementById('l_vdc').focus();
        }
        update();
    }

    function nepJoin(arr) {
        let localArr = [...arr];
        if (!localArr.length) return "";
        if (localArr.length === 1) return localArr[0];
        const last = localArr.pop();
        return localArr.join(', ') + ' र ' + last;
    }

    function renderHaqUI() {
        const container = document.getElementById('haq_inputs');
        if(!document.getElementById('chk_haq').checked) { container.innerHTML = ""; return; }
        container.innerHTML = state.apps.map((a, i) => `
            <div style="border-bottom:1px solid #ddd; padding:5px 0;">
                <label><input type="checkbox" onchange="state.apps[${i}].renounce=this.checked; update(); renderHaqUI();" ${a.renounce?'checked':''}> ${a.name}</label>
                ${a.renounce ? `
                    <div class="row-2">
                        <input type="text" value="${a.r_reg}" placeholder="द.नं." class="input-box" oninput="state.apps[${i}].r_reg=this.value; update();">
                        <input type="text" value="${a.r_dt}" placeholder="मिति" class="input-box" oninput="state.apps[${i}].r_dt=this.value; update();">
                    </div>` : ''}
            </div>
        `).join('');
    }

    function update() {
        const inputVals = {};
        document.querySelectorAll('input, textarea, select').forEach(el => {
            if(el.id) inputVals[el.id] = (el.type === 'checkbox' ? el.checked : el.value);
        });
        localStorage.setItem('namsari_v2_storage', JSON.stringify({ state, inputs: inputVals }));

        document.getElementById('list_apps').innerHTML = state.apps.map((x,i)=>`<div class="item-list">${x.name}<span class="del-btn" onclick="state.apps.splice(${i},1);update();renderHaqUI();">×</span></div>`).join('');
        document.getElementById('list_mrtks').innerHTML = state.mrtks.map((x,i)=>`<div class="item-list">${x.name}<span class="del-btn" onclick="state.mrtks.splice(${i},1);update();">×</span></div>`).join('');
        document.getElementById('list_lands').innerHTML = state.lands.map((x,i)=>`<div class="item-list">${x.vdc}-${x.ward}: ${x.ks.join(',')}<span class="del-btn" onclick="state.lands.splice(${i},1);update();">×</span></div>`).join('');

        const v = (id) => document.getElementById(id)?.value || ".......";
        
        const appCount = state.apps.length;
        const decCount = state.mrtks.length;
        const activeApps = state.apps.filter(x => !x.renounce);
        const renouncers = state.apps.filter(x => x.renounce);
        
        const nijaText = decCount > 1 ? "निजहरू" : "निज";
        const haqdarText = appCount > 1 ? "हकदारहरू" : "हकदार";
        const hamroText = appCount > 1 ? "हामी मात्र भएकोले हाम्रो" : "म मात्र भएकोले मेरो";
        const nivedakWord = appCount > 1 ? "निवेदकहरूको" : "निवेदकको";
        const nivedakWordPlain = appCount > 1 ? "निवेदकहरू" : "निवेदक";

        const decNames = nepJoin(state.mrtks.map(m => `<b>${m.name}</b>`));
        const decDts = state.mrtks.map(m => `<b>${m.rel} ${m.name}</b>को मिति <b>${m.dt}</b>`).join(' र ');
        
        const landStrings = state.lands.map(l => `साविक <b>${l.vdc}</b> वडा नं. <b>${l.ward}</b> को कि.नं. <b>${nepJoin([...l.ks])}</b>`);
        const landFinal = nepJoin(landStrings);
        const landG = state.lands.reduce((a,b)=>a+b.ks.length, 0) > 1 ? "का जग्गाहरू" : "को जग्गा";

        const activeNamesOnly = nepJoin(activeApps.map(a => `<b>${a.name}</b>`));

        let html = `
            <div style="text-align:center; color:red; line-height:1.2; border-bottom:2px double black; padding-bottom:5px;">
                <div style="font-size:10pt;">नेपाल सरकार</div><div style="font-size:11pt;">भूमि व्यवस्था, सहकारी तथा गरिबी निवारण मन्त्रालय</div>
                <div style="font-size:12pt;">भूमि व्यवस्थापन तथा अभिलेख विभाग</div><div style="font-size:18pt; font-weight:bold;">भूमि प्रशासन कार्यालय</div>
                <div style="font-size:11pt;">चौतारा, सिन्धुपाल्चोक</div>
            </div>
            <div style="text-align:center; font-weight:bold; font-size:18pt; text-decoration:underline; margin:15px 0;">टिप्पणी र आदेश</div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:13pt; margin-bottom:10px;">
                <div style="text-align:left;">द.नं.: ${v('in_rn')} &nbsp; द.मिति: ${v('in_rd')}</div>
                <div style="text-align:right;">मि.नं.: ${v('in_mn')} &nbsp; मिति: ${v('in_dt')}</div>
            </div>`;

        let sn_count = 1;
        html += `<div style="display:flex; gap:10px; margin-top:15px;"><div style="flex:3;"><label>निवेदकको विवरण:</label><table class="doc-table">`;
        const sons = state.apps.filter(x=>x.type==='son');
        const wives = state.apps.filter(x=>x.type==='wife');
        if(sons.length){
            html += `<tr><th colspan="4"><b>बाबु/बाजे तर्फ</b></th></tr><tr><th>सि.नं.</th><th>नामथर</th><th>बाबुको नाम</th><th>बाजेको नाम</th></tr>`;
            sons.forEach(x => html += `<tr><td>${toNep(sn_count++)}</td><td>${x.name}</td><td>${x.f}</td><td>${x.gf}</td></tr>`);
        }
        if(wives.length){
            html += `<tr><th colspan="4"><b>पति/ससुरा तर्फ</b></th></tr><tr><th>सि.नं.</th><th>नामथर</th><th>पतिको नाम</th><th>ससुराको नाम</th></tr>`;
            wives.forEach(x => html += `<tr><td>${toNep(sn_count++)}</td><td>${x.name}</td><td>${x.f}</td><td>${x.gf}</td></tr>`);
        }
        html += `</table></div><div style="flex:1; border:1px solid black; padding:5px; font-size:11pt;"><b>मृतकको विवरण:</b><hr>${state.mrtks.map(m=>`नाम: ${m.name}<br>नाता: ${m.rel}<br>मिति: ${m.dt}`).join('<hr>')}</div></div>`;

        let haqText = "";
        if(document.getElementById('chk_haq').checked && renouncers.length) {
            let rMsg = renouncers.map(r => `${renouncers.length>1?'निवेदकहरू':'निवेदक'} <b>${r.name}</b>ले द.नं. <b>${r.r_reg}</b> मिति <b>${r.r_dt}</b> को निवेदनबाट नामसारी गर्न मञ्जुरी दिएको`).join(' र ');
            haqText = " साथै " + rMsg;
        }

        html += `
            <p style="text-indent:50px; margin-top:20px;">श्रीमान्,</p>
            <p style="text-indent:50px;">सिन्धुपाल्चोक जिल्ला ${landFinal} ${landG} मृतक ${decNames}को नाममा दर्ता रही आएकोमा ${nijaText}को ${decDts} मा मृत्यु भएकोले ${nijaText}को शेषपछिको हक खाने नजिकको ${haqdarText} ${hamroText} नाममा नामसारी गरिपाउँ भनि उपरोक्त अनुसारका ${nivedakWord} माग निवेदन ।</p>
            <p style="text-indent:50px;">माग दावी भएका जग्गाहरूको मोठ कायम रहेको र रोक्का नरहेको भनि सम्बन्धित फाँटबाट भिडी आएको । मिसल संलग्न रहेका माग दावी अनुसारका जग्गा ${nivedakWordPlain}को नाममा नामसारी गरिदिनका लागि अनुरोध गर्दै <b>${v('in_loc')}</b> वडा नं. <b>${v('in_lw')}</b> को च.नं. <b>${v('in_sc')}</b> मिति <b>${v('in_sd')}</b> को सिफारिस, मृतक र निवेदकहरूवीचको नाता प्रमाणपत्र, जग्गाधनीको मृत्युदर्ताको प्रमाणपत्र, निवेदकको नागरिकता प्रमाणपत्र र निवेदकले गरेको सनाखत ${v('in_extra')}${haqText} समेतको आधारमा माग भए बमोजिम ${landFinal} नामसारी सेवा शुल्क रू. ${v('fee_s')} ${document.getElementById('chk_late').checked ? ' र विलम्ब शुल्क रू. '+v('fee_l') : ''} असुली भई मुलुकी देवानी संहिता ऐन, २०७४ को २३९(१) बमोजिम निवेदकहरू <b>${activeNamesOnly}</b>को नाममा नामसारी हुन आवश्यक निर्णयार्थ पेश ।</p>
        `;

        document.getElementById('preview').innerHTML = html;
    }

    function resetAll() {
        if(confirm("विवरण मेटाउने?")) { localStorage.clear(); location.reload(); }
    }

    function exportWord() {
        const html = `<html><head><meta charset="utf-8"><style>.doc-table{width:100%; border-collapse:collapse;} .doc-table th, .doc-table td{border:1px solid black; padding:5px; text-align:center;}</style></head><body>${document.getElementById('preview').innerHTML}</body></html>`;
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'Tippani.doc'; a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('namsari_v2_storage');
        if(saved) {
            const d = JSON.parse(saved);
            state = d.state;
            for(let id in d.inputs) {
                const el = document.getElementById(id);
                if(el) { if(el.type==='checkbox') el.checked = d.inputs[id]; else el.value = d.inputs[id]; }
            }
        }
        update(); 
        renderHaqUI();
    }
</script>
</body>
</html>
