<!DOCTYPE html>
<html lang="ne">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नामसारी टिप्पणी</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Mukta', sans-serif;
            background-color: #cbd5e1;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .input-panel {
            flex: 0 0 400px;
            background: white;
            padding: 15px;
            border-right: 1px solid #94a3b8;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 2px;
            color: #475569;
        }

        .input-box {
            border: 1px solid #94a3b8;
            padding: 5px;
            border-radius: 4px;
            width: 100%;
            font-size: 13px;
            font-family: 'Mukta', sans-serif;
            margin-bottom: 5px;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 12px;
            width: 100%;
            margin-top: 5px;
        }

        .btn-blue {
            background-color: #2563eb;
        }

        .btn-red {
            background-color: #ef4444;
        }

        .btn-green {
            background-color: #16a34a;
        }

        .btn-dark {
            background-color: #334155;
        }

        .preview-container {
            flex: 1;
            background: #94a3b8;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-page {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 1.5cm 1.27cm 1.5cm 2.54cm;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: justify;
            line-height: 1.5;
            font-size: 14pt;
            color: #000;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            border: 1.2px solid black;
            margin-bottom: 10px;
        }

        .doc-table th,
        .doc-table td {
            border: 1px solid black;
            padding: 4px;
            text-align: center;
            font-size: 11pt;
        }

        .item-list {
            background: #f1f5f9;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #cbd5e1;
        }

        .del-btn {
            color: red;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        @media print {

            /* १. ब्राउजरको डिफल्ट मार्जिन र साइज कन्ट्रोल गर्ने */
            @page {
                size: A4;
                margin: 0;
                /* ब्राउजरको मार्जिन शून्य पार्ने, कन्टिएन्टको प्याडिङले काम गर्छ */
            }

            .no-print {
                display: none !important;
            }

            body,
            html {
                overflow: visible !important;
                height: auto !important;
                background: white !important;
            }

            .preview-container {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
                overflow: visible !important;
            }

            .preview-page {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                /* २. प्रिन्ट गर्दा min-height हटाउने ताकि कन्टिएन्ट जति छ त्यतिमै रोकिओस् */
                min-height: auto !important;
                height: auto !important;
                margin: 0 !important;
                /* ३. प्याडिङ कायम राख्ने ताकि मार्जिन देखियोस् */
                padding: 1.5cm 1.27cm 1.5cm 2.54cm !important;
                page-break-after: avoid !important;
                page-break-before: avoid !important;
            }

            /* ४. स्क्रोलबार लुकाउने */
            ::-webkit-scrollbar {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="main-layout">
        <div class="input-panel no-print">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 style="margin:0; font-size:1.1rem;">नामसारी टिप्पणी</h2>
                <button onclick="resetAll()" class="btn btn-red" style="width:auto; padding:4px 10px;">Reset</button>
            </div>

            <div class="input-group">
                <div class="row-2">
                    <div><label>मि.नं.:</label><input type="text" id="in_mn" class="input-box" oninput="update()"></div>
                    <div><label>मिति:</label><input type="text" id="in_dt" class="input-box" oninput="update()"></div>
                </div>
                <div class="row-2">
                    <div><label>द.नं.: (निवेदन)</label><input type="text" id="in_rn" class="input-box"
                            oninput="update()"></div>
                    <div><label>द.मिति: (निवेदन)</label><input type="text" id="in_rd" class="input-box"
                            oninput="update()"></div>
                </div>
            </div>

            <div class="input-group" style="background:#eef2ff;">
                <label>१. निवेदक विवरण</label>
                <input type="text" id="app_name" placeholder="नाम थर" class="input-box">
                <div class="row-2">
                    <select id="app_type" class="input-box">
                        <option value="son">बाबु/बाजे तर्फ</option>
                        <option value="wife">पति/ससुरा तर्फ</option>
                    </select>
                    <input type="text" id="app_f" placeholder="बाबु/पतिको नाम" class="input-box">
                </div>
                <input type="text" id="app_gf" placeholder="बाजे/ससुराको नाम" class="input-box">
                <button onclick="addApp()" class="btn btn-blue">+ निवेदक थप्नुहोस्</button>
                <div id="list_apps"></div>

                <div style="margin-top:10px;">
                    <label><input type="checkbox" id="chk_haq" onchange="renderHaqUI(); update();"> हक छोड्ने छ?</label>
                    <div id="haq_inputs"></div>
                </div>
            </div>

            <div class="input-group" style="background:#fff1f2;">
                <label>२. मृतक/जग्गाधनी विवरण</label>
                <input type="text" id="m_name" placeholder="मृतकको नाम" class="input-box"
                    oninput="syncLandowner(this.value)">
                <div class="row-2">
                    <input type="text" id="m_rel" placeholder="नाता" class="input-box">
                    <input type="text" id="m_dt" placeholder="मृत्यु मिति" class="input-box">
                </div>
                <button onclick="addMrtk()" class="btn btn-red">+ मृतक थप्नुहोस्</button>
                <div id="list_mrtks"></div>
                <hr>
                <label>जग्गाधनीको नाम (टिप्पणीमा):</label>
                <input type="text" id="in_landowner" placeholder="जग्गाधनीको नाम" class="input-box" oninput="update()">
            </div>

            <div class="input-group" style="background:#f0fdf4;">
                <label>३. जग्गा विवरण</label>
                <div class="row-2">
                    <input type="text" id="l_vdc" placeholder="साविक गा.वि.स." class="input-box">
                    <input type="text" id="l_ward" placeholder="वडा" class="input-box">
                </div>
                <input type="text" id="l_kitta" placeholder="कि.नं." class="input-box">
                <div class="row-2">
                    <button onclick="addLand('same')" class="btn btn-green">Same VDC</button>
                    <button onclick="addLand('new')" class="btn btn-dark">New VDC</button>
                </div>
                <div id="list_lands"></div>
            </div>

            <div class="input-group">
                <div class="row-2">
                    <input type="text" id="in_loc" placeholder="स्थानीय तह" class="input-box" oninput="update()">
                    <input type="text" id="in_lw" placeholder="वडा नं." class="input-box" oninput="update()">
                </div>
                <div class="row-2">
                    <input type="text" id="in_sc" placeholder="सि.च.नं." class="input-box" oninput="update()">
                    <input type="text" id="in_sd" placeholder="सि.मिति" class="input-box" oninput="update()">
                </div>
                <textarea id="in_extra" placeholder="थप विवरण (सनाखत पछिको)..." class="input-box"
                    oninput="update()"></textarea>
                <div class="row-2">
                    <input type="text" id="fee_s" value="२५००" class="input-box" oninput="update()">
                    <label style="display:flex; align-items:center;"><input type="checkbox" id="chk_late" checked
                            onchange="update()"> विलम्ब</label>
                    <input type="text" id="fee_l" value="१००" class="input-box" oninput="update()">
                </div>
            </div>
            <div class="input-group">
                <label style="color: #1e40af; font-weight: bold; font-size: 16px;">
                    <input type="checkbox" id="chk_hissa" onchange="update()"> हकहिस्सा मात्र नामसारी हो?
                </label>
                 <label style="color: #9333ea; font-weight: bold; font-size: 16px">
        <input type="checkbox" id="chk_guthi" onchange="update()"> गुठी जग्गा हो?
    </label>
            </div>

            <button onclick="window.print()" class="btn btn-blue">🖨️ Print</button>
            <button onclick="exportWord()" class="btn btn-green">📄 Word Export</button>
        </div>

        <div class="preview-container">
            <div id="preview" class="preview-page"></div>
        </div>
    </div>

    <script>
        let state = { apps: [], mrtks: [], lands: [] };


        // १. अङ्क र डटलाई तत्काल बदल्ने फङ्सन
document.addEventListener('input', e => {
    if (e.target.type === 'text' || e.target.tagName === 'TEXTAREA') {
        if (e.target.id !== 'in_landowner') {
            // कर्सरको पोजिसन सेभ गर्ने (ताकि टाइप गर्दा कर्सर अन्तिममा नभागोस्)
            let start = e.target.selectionStart;
            let end = e.target.selectionEnd;

            let originalValue = e.target.value;
            let newValue = originalValue
                .replace(/\d/g, d => "०१२३४५६७८९"[d]) // अङ्क बदल्ने
                .replace(/\./g, "।");               // डटलाई । मा बदल्ने

            if (originalValue !== newValue) {
                e.target.value = newValue;
                // कर्सरलाई पुरानै ठाउँमा फर्काउने
                e.target.setSelectionRange(start, end);
            }
        }
    }
    update();
});

// २. सिरियल नम्बर आदिको लागि प्रयोग हुने फङ्सन अपडेट
function toNep(num) {
    if (!num) return "";
    return num.toString()
        .replace(/\d/g, d => "०१२३४५६७८९"[d])
        .replace(/\./g, "।");
}

        function syncLandowner(val) {
            if (state.mrtks.length === 0) {
                document.getElementById('in_landowner').value = val;
                update();
            }
        }

        function addApp() {
            const name = document.getElementById('app_name').value;
            if (!name) return;
            state.apps.push({
                name,
                type: document.getElementById('app_type').value,
                f: document.getElementById('app_f').value,
                gf: document.getElementById('app_gf').value,
                renounce: false, r_reg: "", r_dt: ""
            });
            document.getElementById('app_name').value = "";
            renderHaqUI();
            update();
        }

        function addMrtk() {
            const name = document.getElementById('m_name').value;
            if (!name) return;
            state.mrtks.push({ name, rel: document.getElementById('m_rel').value, dt: document.getElementById('m_dt').value });
            if (state.mrtks.length === 1 && !document.getElementById('in_landowner').value)
                document.getElementById('in_landowner').value = name;
            document.getElementById('m_name').value = "";
            update();
        }

        function addLand(mode) {
            const v = document.getElementById('l_vdc').value;
            const w = document.getElementById('l_ward').value;
            const k = document.getElementById('l_kitta').value;
            if (!k) return;
            let match = state.lands.find(x => x.vdc === v && x.ward === w);
            if (match) match.ks.push(k); else state.lands.push({ vdc: v, ward: w, ks: [k] });

            document.getElementById('l_kitta').value = "";

            if (mode === 'new') {
                document.getElementById('l_vdc').value = "";
                document.getElementById('l_ward').value = "";
                document.getElementById('l_vdc').focus(); // Autofocus to VDC
            } else {
                document.getElementById('l_kitta').focus(); // Autofocus to Kitta No.
            }
            update();
        }
        function nepJoin(arr) {
            let localArr = [...arr];
            if (!localArr.length) return "";
            if (localArr.length === 1) return localArr[0];
            const last = localArr.pop();
            return localArr.join(', ') + ' र ' + last;
        }

        function renderHaqUI() {
            const container = document.getElementById('haq_inputs');
            if (!document.getElementById('chk_haq').checked) { container.innerHTML = ""; return; }
            container.innerHTML = state.apps.map((a, i) => `
            <div style="border-bottom:1px solid #ddd; padding:5px 0;">
                <label><input type="checkbox" onchange="state.apps[${i}].renounce=this.checked; update(); renderHaqUI();" ${a.renounce ? 'checked' : ''}> ${a.name}</label>
                ${a.renounce ? `<div class="row-2"><input type="text" value="${a.r_reg}" placeholder="द.नं." class="input-box" oninput="state.apps[${i}].r_reg=this.value; update();"><input type="text" value="${a.r_dt}" placeholder="मिति" class="input-box" oninput="state.apps[${i}].r_dt=this.value; update();"></div>` : ''}
            </div>
        `).join('');
        }

function update() {
    const v = (id) => document.getElementById(id)?.value || ".......";

    // 1. FETCH GLOBAL SETTINGS
    const settings = JSON.parse(localStorage.getItem('global_office_settings')) || {
        gov: "नेपाल सरकार",
        ministry: "भूमि व्यवस्था, सहकारी तथा गरिबी निवारण मन्त्रालय",
        dept: "भूमि व्यवस्थापन तथा अभिलेख विभाग",
        office: "भूमि प्रशासन कार्यालय",
        addr: "चौतारा, सिन्धुपाल्चोक",
        def_dist: "सिन्धुपाल्चोक"
    };

    // Sidebar lists (UI sync)
    document.getElementById('list_apps').innerHTML = state.apps.map((x, i) => `<div class="item-list">${x.name}<span class="del-btn" onclick="state.apps.splice(${i},1);update();renderHaqUI();">×</span></div>`).join('');
    document.getElementById('list_mrtks').innerHTML = state.mrtks.map((x, i) => `<div class="item-list">${x.name}<span class="del-btn" onclick="state.mrtks.splice(${i},1);update();">×</span></div>`).join('');
    document.getElementById('list_lands').innerHTML = state.lands.map((x, i) => `<div class="item-list">${x.vdc}-${x.ward}: ${x.ks.join(',')}<span class="del-btn" onclick="state.lands.splice(${i},1);update();">×</span></div>`).join('');

    const activeApps = state.apps.filter(x => !x.renounce);
    const renouncers = state.apps.filter(x => x.renounce);
    const sons = state.apps.filter(x => x.type === 'son');
    const wives = state.apps.filter(x => x.type === 'wife');

    const isPlural = state.apps.length > 1;
    const nijaText = state.mrtks.length > 1 ? "निजहरू" : "निज";
    const activehakdar = activeApps.length > 1 ? "हकदारहरू" : "हकदार";
    const activeNivedakLabel = activeApps.length > 1 ? "निवेदकहरू" : "निवेदक";
    const nivedakWord = isPlural ? "निवेदकहरूको" : "निवेदकको";
    const nivedakWordPlain = isPlural ? "निवेदकहरू" : "निवेदक";
    const nivedakKa = isPlural ? "निवेदकहरूका" : "निवेदकका";

    const totalKittas = state.lands.reduce((acc, land) => acc + land.ks.length, 0);
    const landPluralLabel = totalKittas > 1 ? "का जग्गाहरू" : "को जग्गा";

    const allMrtkNames = nepJoin(state.mrtks.map(m => `<b>${m.name}</b>`));
    let hissaText = (document.getElementById('chk_hissa') && document.getElementById('chk_hissa').checked) ? "को " + allMrtkNames + "को हकहिस्सा मात्र" : "";
    // गुठी चेक गरिएको छ भने शब्द थप्ने
let guthiText = (document.getElementById('chk_guthi') && document.getElementById('chk_guthi').checked) ? " <b>गुठी यथावत कायम राखी</b> " : "";

    const decDts = state.mrtks.map(m => `<b>${m.rel} ${m.name}</b>को मिति <b>${m.dt}</b>`).join(' र ');
    const landFinal = nepJoin(state.lands.map(l => `साविक <b>${l.vdc}</b> वडा नं. <b>${l.ward}</b> को कि.नं. <b>${nepJoin([...l.ks])}</b>`));
    const activeNamesOnly = nepJoin(activeApps.map(a => `<b>${a.name}</b>`));

    // 2. GENERATE HEADER (Using Global Settings)
    let headerHtml = `
    <table style="width: 100%; border-bottom: 2px double black; margin-bottom: 15px; border-collapse: collapse; border: none;">

    <p style="text-indent:50px;">माग दावी भएका जग्गाहरूको मोठ कायम रहेको र रोक्का नरहेको भनी सम्बन्धित फाँटबाट भिडी आएको । मिसिल संलग्न रहेका माग दावी अनुसारका जग्गा ${nivedakWordPlain}को नाममा नामसारी गरिदिनका लागि अनुरोध गर्दै <b>${v('in_loc')}</b> <b>${v('in_lw')}</b> नं. वडा कार्यालयको को च.नं. <b>${v('in_sc')}</b> मिति <b>${v('in_sd')}</b> को सिफारिस, मृतक र निवेदकहरू बीचको नाता प्रमाणपत्र, जग्गाधनीको मृत्युदर्ताको प्रमाणपत्र, ${finalGrammar} समेतको आधारमा नामसारी सेवा शुल्क रू. ${v('fee_s')} ${document.getElementById('chk_late').checked ? ' र विलम्ब शुल्क रू. ' + v('fee_l') : ''} असुली भई मुलुकी देवानी संहिता ऐन, २०७४ को दफा २३९(१) बमोजिमको ${activehakdar} ${activeNivedakLabel} <b>${activeNamesOnly}</b>को नाममा ${settings.def_dist} जिल्ला ${landFinal} ${landPluralLabel}${hissaText} ${guthiText} नामसारी हुन आवश्यक निर्णयार्थ पेश ।</p>
    `;

    // 5. UPDATE PREVIEW
    document.getElementById('preview').innerHTML = headerHtml + tableHtml + bodyHtml;
    saveState();
}

        function resetAll() { if (confirm("विवरण मेटाउने?")) { localStorage.clear(); location.reload(); } }

        function exportWord() {
            const content = document.getElementById('preview').innerHTML;
            const appName = state.apps.length > 0 ? state.apps[0].name.replace(/\s+/g, '_') : 'विवरण';
            const style = `
           <style>
        @page { size: A4; margin: 1cm 1cm 1cm 2.2cm; }
        body { font-family: 'Mukta', 'Arial', sans-serif; line-height: 1.2; font-size: 14pt; color: black; }
        
        /* Justify text and remove extra paragraph spacing in Word */
        p { text-align: justify; margin: 0 0 10pt 0; text-justify: inter-word; }
        
        /* Spacing fixes for Header */
        table { border-collapse: collapse; width: 100%; margin: 0; padding: 0; }
        td { vertical-align: top; padding: 0; margin: 0; }
        div { margin: 0; padding: 0; line-height: 1.1; }

table { border: none; border-collapse: collapse; width: 100%; }
td { border: none; }
        
        /* Table for details */
        .doc-table { border: 1px solid black; margin-top: 10px; }
        .doc-table th, .doc-table td { border: 1px solid black; padding: 3px; text-align: center; font-size: 11pt; }
    </style>`;
            const html = `<html><head><meta charset="utf-8">${style}</head><body>${content}</body></html>`;
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `नामसारी_टिप्पणी_${appName}.doc`;
            a.click();
        }
        window.onload = () => {
            const saved = localStorage.getItem('namsari_v2_storage');
            if (saved) {
                const d = JSON.parse(saved); state = d.state;
                for (let id in d.inputs) {
                    const el = document.getElementById(id);
                    if (el) { if (el.type === 'checkbox') el.checked = d.inputs[id]; else el.value = d.inputs[id]; }
                }
            }
            update(); renderHaqUI();
        }
        function saveState() {
            const inputs = {};
            // सबै input, textarea र checkbox को भ्यालु जम्मा गर्ने
            document.querySelectorAll('.input-box, textarea, input[type="checkbox"]').forEach(el => {
                if (el.id) {
                    inputs[el.id] = (el.type === 'checkbox') ? el.checked : el.value;
                }
            });
            // localStorage मा सेभ गर्ने
            localStorage.setItem('namsari_v2_storage', JSON.stringify({ state, inputs }));
        }
    </script>
</body>
