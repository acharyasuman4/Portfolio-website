<!DOCTYPE html>
<html lang="ne">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रतिलिपि पुर्जा - टिप्पणी</title>
        <!-- २. वर्णन (Description) - गुगल सर्चमा देखिने छोटो बिवरण -->
    <meta name="description"
        content=" जग्गाधनी लालपुर्जाको प्रतिलिपीको टिप्पणी ।">

    <!-- ३. कीवर्डहरू (Keywords) -->
    <meta name="keywords"
        content="acharyasuman, acharyasuman4, मालपोत, प्रतिलिपी पुर्जा, जग्गाधनी प्रमाण पुर्जा, LIN, PM, PF, PT, प्रतिलिपी, पुर्जाको प्रतिलिपी, पुरानो खिची नयाँ पुर्जा";>

    <!-- ४. सामाजिक सञ्जालका लागि (Open Graph Tags) - फेसबुकमा लिङ्क सेयर गर्दा राम्रो देखिनका लागि -->
    <meta property="og:title" content="प्रतिलिपी पुर्जा टिप्पणी ">
    <meta property="og:description" content="कार्यलयको लागि प्रतिलिपी पुर्जा दिन टिप्पणी तयार गर्ने टुल">
    <meta property="og:url" content="https://acharyasuman4.com.np/tippani/pratilipi_purja/">


    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Mukta', sans-serif;
            background-color: #cbd5e1;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .input-panel {
            flex: 0 0 420px;
            background: white;
            padding: 15px;
            border-right: 1px solid #94a3b8;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 2px;
            color: #475569;
        }

        .input-box {
            border: 1px solid #94a3b8;
            padding: 6px;
            border-radius: 4px;
            width: 100%;
            font-size: 13px;
            font-family: 'Mukta', sans-serif;
            margin-bottom: 5px;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 12px;
            width: 100%;
            margin-top: 5px;
        }

        .btn-blue {
            background-color: #2563eb;
        }

        .btn-red {
            background-color: #ef4444;
        }

        .btn-green {
            background-color: #16a34a;
        }

        .btn-dark {
            background-color: #334155;
        }

        .preview-container {
            flex: 1;
            background: #94a3b8;
            overflow-y: auto;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-page {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 1.5cm 1.27cm 1.5cm 2.54cm;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: justify;
            line-height: 1.5;
            font-size: 14pt;
            color: #000;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            border: 1.2px solid black;
            margin-bottom: 10px;
        }

        .doc-table th,
        .doc-table td {
            border: 1px solid black;
            padding: 4px;
            text-align: center;
            font-size: 11pt;
        }

        .item-list {
            background: #f1f5f9;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #cbd5e1;
        }

        .del-btn {
            color: red;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        .hidden {
            display: none;
        }

        .kitta-chip-container {
            border: 1px solid #ddd;
            padding: 5px;
            background: white;
            max-height: 100px;
            overflow-y: auto;
            margin-bottom: 5px;
        }

        @media print {
            .no-print {
                display: none !important;
            }

            .preview-container {
                display: block;
                background: white;
            }

            .preview-page {
                box-shadow: none;
                width: 100%;
                padding: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
</head>

<body>
    <div class="main-layout">
        <div class="input-panel no-print">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; font-size:1.1rem;">प्रतिलिपि पुर्जा टिप्पणी</h2>
                <button onclick="location.href='index.html'" class="btn btn-dark"
                    style="width:auto; padding:4px 10px;">🏠 Home</button>
            </div>

            <div class="input-group">
                <div class="row-2">
                    <div><label>मि.नं.:</label><input type="text" id="in_mn" class="input-box" oninput="update()"></div>
                    <div><label>मि. मिति:</label><input type="text" id="in_md" class="input-box" oninput="update()">
                    </div>
                </div>
                <div class="row-2">
                    <div><label>दर्ता नं.:</label><input type="text" id="in_rn" class="input-box" oninput="update()">
                    </div>
                    <div><label>दर्ता मिति:</label><input type="text" id="in_rd" class="input-box" oninput="update()">
                    </div>
                </div>
            </div>

            <div class="input-group" style="background:#eef2ff;">
                <label>१. निवेदक विवरण</label>
                <input type="text" id="app_name" placeholder="नाम थर" class="input-box">
                <div class="row-2">
                    <select id="app_type" class="input-box">
                        <option value="son">बाबु/बाजे तर्फ</option>
                        <option value="wife">पति/ससुरा तर्फ</option>
                    </select>
                    <input type="text" id="app_f" placeholder="बाबु/पति" class="input-box">
                </div>
                <input type="text" id="app_gf" placeholder="बाजे/ससुरा" class="input-box">
                <button onclick="addApp()" class="btn btn-blue">+ थप्नुहोस्</button>
                <div id="list_apps"></div>
                <label style="margin-top:8px;">जग्गाधनीको नाम:</label>
                <input type="text" id="in_landowner" class="input-box" oninput="update()">
            </div>

            <div class="input-group" style="background:#f0fdf4;">
                <label>२. जग्गा विवरण</label>
                <div class="row-2">
                    <input type="text" id="l_vdc" placeholder="साविक गा.वि.स." class="input-box">
                    <input type="text" id="l_ward" placeholder="वडा" class="input-box">
                </div>
                <input type="text" id="l_kitta" placeholder="कि.नं." class="input-box">
                <div class="row-2">
                    <button onclick="addLand('same')" class="btn btn-green">Same VDC</button>
                    <button onclick="addLand('new')" class="btn btn-dark">New VDC</button>
                </div>
                <div id="list_lands"></div>
            </div>

            <div class="input-group">
                <label>३. पुर्जाको अवस्था र रोक्का</label>
                <select id="in_reason" class="input-box" onchange="checkReason(); update();">
                    <option value="हराएको">हराएको</option>
                    <option value="पुरानो/झुत्रो भएको">पुरानो/झुत्रो भएको</option>
                    <option value="अन्य">अन्य</option>
                </select>
                <input type="text" id="in_reason_extra" placeholder="कैफियत लेख्नुहोस्..." class="input-box hidden"
                    oninput="update()">

                <div style="margin-top:8px; border-top:1px solid #ddd; padding-top:5px;">
                    <label><input type="checkbox" id="chk_moth" checked onchange="toggleMoth()"> मोठ कायम छ</label>
                    <input type="text" id="txt_moth_custom" placeholder="कैफियत..." class="input-box hidden"
                        oninput="update()">

                    <label style="margin-top:5px;"><input type="checkbox" id="chk_rokka" checked
                            onchange="toggleRokka()"> रोक्का छैन</label>

                    <!-- Rokka Panel -->
                    <div id="rokka_panel" class="hidden"
                        style="background:#fff1f2; padding:5px; border-radius:5px; margin-top:5px;">
                        <label>रोक्का थप्नुहोस्:</label>
                        <input type="text" id="r_office" placeholder="रोक्का राख्ने निकाय" class="input-box">
                        <div class="row-2">
                            <input type="text" id="r_cn" placeholder="च.नं." class="input-box">
                            <input type="text" id="r_dt" placeholder="मिति" class="input-box">
                        </div>
                        <label>रोक्का भएका कित्ता छान्नुहोस्:</label>
                        <div class="kitta-chip-container" id="rokka_kitta_select"></div>
                        <button onclick="addRokkaEntry()" class="btn btn-red">रोक्का रेकर्ड थप्नुहोस्</button>
                        <div id="list_rokka_entries"></div>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>४. सिफारिस र सहमति</label>
                <div class="row-2">
                    <input type="text" id="in_loc" placeholder="स्थानीय तह" class="input-box" oninput="update()">
                    <input type="text" id="in_lw" placeholder="वडा नं." class="input-box" oninput="update()">
                </div>
                <div class="row-2">
                    <input type="text" id="in_sc" placeholder="सि.च.नं." class="input-box" oninput="update()">
                    <input type="text" id="in_sd" placeholder="सि.मिति" class="input-box" oninput="update()">
                </div>
                <label style="margin-top:5px; color:#b91c1c;">रोक्का राख्ने निकायको सहमति (भएमा):</label>
                <input type="text" id="in_con_office" placeholder="सहमति दिने निकाय" class="input-box"
                    oninput="update()">
                <div class="row-2">
                    <input type="text" id="in_con_cn" placeholder="सहमति च.नं." class="input-box" oninput="update()">
                    <input type="text" id="in_con_dt" placeholder="सहमति मिति" class="input-box" oninput="update()">
                </div>
                <label>राजस्व (रु.):</label>
                <input type="text" id="fee_s" value="500" class="input-box" oninput="update()">
            </div>

            <div class="input-group" style="background:#fefce8;">
                <label>५. पुर्जा जारी गर्ने कित्ताहरू छान्नुहोस्:</label>
                <div class="kitta-chip-container" id="issue_kitta_select"></div>
            </div>

            <button onclick="window.print()" class="btn btn-blue">🖨️ Print</button>
            <button onclick="exportWord()" class="btn btn-green">📄 Word Export</button>
            <button onclick="resetAll()" class="btn btn-red" style="margin-top:20px;">सबै डाटा मेटाउनुहोस्</button>
        </div>

        <div class="preview-container">
            <div id="preview" class="preview-page"></div>
        </div>
    </div>

    <script>

        
        let state = {
            apps: [],
            lands: [],
            rokkaEntries: [],
            issueKittas: []
        };

        function toNep(str) {
            if (!str) return "";
            return str.toString().replace(/\d/g, d => "०१२३४५६७८९"[d]).replace(/\./g, "।");
        }

        function formatList(arr) {
            if (!arr.length) return "";
            if (arr.length === 1) return arr[0];
            if (arr.length === 2) return arr[0] + " र " + arr[1];
            return arr.slice(0, -1).join(", ") + " र " + arr[arr.length - 1];
        }

        function toggleMoth() {
            document.getElementById('txt_moth_custom').classList.toggle('hidden', document.getElementById('chk_moth').checked);
            update();
        }

        function toggleRokka() {
            document.getElementById('rokka_panel').classList.toggle('hidden', document.getElementById('chk_rokka').checked);
            if (!document.getElementById('chk_rokka').checked) renderKittaSelectors();
            update();
        }

        function checkReason() {
            const r = document.getElementById('in_reason').value;
            const extra = document.getElementById('in_reason_extra');
            const fee = document.getElementById('fee_s');
            extra.classList.toggle('hidden', r !== 'अन्य');
            if (r === 'पुरानो/झुत्रो भएको') fee.value = "0";
            else if (fee.value === "0") fee.value = "500";
            update();
        }

        function addApp() {
            const name = document.getElementById('app_name').value;
            if (!name) return;
            state.apps.push({
                name, type: document.getElementById('app_type').value,
                f: document.getElementById('app_f').value, gf: document.getElementById('app_gf').value
            });
            document.getElementById('app_name').value = "";
            document.getElementById('app_f').value = "";
            document.getElementById('app_gf').value = "";
            document.getElementById('in_landowner').value = state.apps.map(a => a.name).join(', ');
            renderApps(); update();
        }

        function renderApps() {
            document.getElementById('list_apps').innerHTML = state.apps.map((a, i) => `
                <div class="item-list">${a.name} (${a.type === 'son' ? 'बाबु' : 'पति'}: ${a.f}) <span class="del-btn" onclick="state.apps.splice(${i},1);renderApps();update();">×</span></div>
            `).join('');
        }

        function addLand(mode) {
            const v = document.getElementById('l_vdc').value, w = document.getElementById('l_ward').value, k = document.getElementById('l_kitta').value;
            if (!k) return;
            let match = state.lands.find(x => x.vdc === v && x.ward === w);
            if (match) match.ks.push(k); else state.lands.push({ vdc: v, ward: w, ks: [k] });

            // Add to issue list by default
            if (!state.issueKittas.includes(k)) state.issueKittas.push(k);

            document.getElementById('l_kitta').value = "";
            if (mode === 'new') { document.getElementById('l_vdc').value = ""; document.getElementById('l_ward').value = ""; document.getElementById('l_vdc').focus(); }
            else document.getElementById('l_kitta').focus();

            renderLands();
            renderKittaSelectors();
            update();
        }

        function renderLands() {
            document.getElementById('list_lands').innerHTML = state.lands.map((l, i) => `
                <div class="item-list">${l.vdc}-${toNep(l.ward)}, कि.नं. ${toNep(l.ks.join(','))} <span class="del-btn" onclick="state.lands.splice(${i},1);renderLands();update();">×</span></div>
            `).join('');
        }

        function renderKittaSelectors() {
            const allKittas = state.lands.flatMap(l => l.ks);

            // Rokka Selector
            const rokkaDiv = document.getElementById('rokka_kitta_select');
            rokkaDiv.innerHTML = `<label style="font-size:10px;"><input type="checkbox" onclick="selectAllKittas('r-chk', this.checked)"> Select All</label><br>` +
                allKittas.map(k => `<label style="font-weight:normal; font-size:12px;"><input type="checkbox" class="r-chk" value="${k}"> ${toNep(k)}</label>`).join(' ');

            // Issue Selector
            const issueDiv = document.getElementById('issue_kitta_select');
            issueDiv.innerHTML = `<label style="font-size:10px;"><input type="checkbox" checked onclick="selectAllKittas('i-chk', this.checked); updateIssueState();"> Select All</label><br>` +
                allKittas.map(k => `<label style="font-weight:normal; font-size:12px;"><input type="checkbox" class="i-chk" value="${k}" ${state.issueKittas.includes(k) ? 'checked' : ''} onchange="updateIssueState()"> ${toNep(k)}</label>`).join(' ');
        }

        function selectAllKittas(className, checked) {
            document.querySelectorAll('.' + className).forEach(el => el.checked = checked);
        }

        function updateIssueState() {
            state.issueKittas = Array.from(document.querySelectorAll('.i-chk:checked')).map(el => el.value);
            update();
        }

        function addRokkaEntry() {
            const off = document.getElementById('r_office').value;
            const kits = Array.from(document.querySelectorAll('.r-chk:checked')).map(el => el.value);
            if (!off || !kits.length) return;
            state.rokkaEntries.push({
                office: off, cn: document.getElementById('r_cn').value, dt: document.getElementById('r_dt').value, ks: kits
            });
            document.getElementById('r_office').value = "";
            document.getElementById('r_cn').value = "";
            document.getElementById('r_dt').value = "";
            renderRokkaEntries(); update();
        }

        function renderRokkaEntries() {
            document.getElementById('list_rokka_entries').innerHTML = state.rokkaEntries.map((e, i) => `
                <div class="item-list" style="background:#fff1f2;">${e.office} (कि.नं. ${e.ks.join(',')}) <span class="del-btn" onclick="state.rokkaEntries.splice(${i},1);renderRokkaEntries();update();">×</span></div>
            `).join('');
        }

        function update() {
            try {
                const v = (id) => {
                    const val = document.getElementById(id)?.value;
                    return (val && val.trim() !== "") ? toNep(val) : ".......";
                };

                // निवेदक र जग्गा
                let tableRows = state.apps.length > 0 ? `<tr><th>सि.नं.</th><th>निवेदकको नाम</th><th>बाबु/पतिको नाम</th><th>बाजे/ससुराको नाम</th></tr>` +
                    state.apps.map((x, i) => `<tr><td>${toNep(i + 1)}</td><td>${x.name}</td><td>${x.f}</td><td>${x.gf}</td></tr>`).join('') : "";

                const landFinal = state.lands.length ? formatList(state.lands.map(l => `साविक <b>${l.vdc}</b> वडा नं. <b>${toNep(l.ward)}</b> को कि.नं. <b>${toNep(l.ks.join(', '))}</b>`)) : ".......";

                const landowner = v('in_landowner');
                const mothText = document.getElementById('chk_moth')?.checked ? `उल्लिखित कित्ता जग्गाहरू <b>${landowner}</b>को नाममा दर्ता श्रेस्ता कायम रहेको` : v('txt_moth_custom');

                // रोक्का विवरण
                let rokkaFinal = " र रोक्का नरहेको";
                if (!document.getElementById('chk_rokka').checked) {
                    if (state.rokkaEntries.length > 0) {
                        rokkaFinal = " र " + state.rokkaEntries.map(e => `कि.नं. <b>${toNep(e.ks.join(', '))}</b> मा <b>${toNep(e.office)}</b> को च.नं. <b>${toNep(e.cn)}</b> मिति <b>${toNep(e.dt)}</b> बाट रोक्का रहेको`).join(' तथा ');
                    } else {
                        rokkaFinal = " र रोक्का रहेको";
                    }
                }

                // सहमति विवरण
                let consentText = "";
                if (document.getElementById('in_con_office').value.trim() !== "") {
                    consentText = `<b>${v('in_con_office')}</b>को च.नं. <b>${v('in_con_cn')}</b> मिति <b>${v('in_con_dt')}</b> को सहमति पत्र, `;
                }

                // सिफारिस
                let sifarishText = document.getElementById('in_loc').value.trim() !== "" ? `<b>${v('in_loc')}</b> <b>${v('in_lw')}</b> नं वडा कार्यालयको च.नं. <b>${v('in_sc')}</b> मिति <b>${v('in_sd')}</b> को सिफारिस, ` : "";

                // निर्णय खण्ड (अतः निवेदकको माग...)
                const reasonRaw = document.getElementById('in_reason').value;
                let reasonText = reasonRaw === 'अन्य' ? v('in_reason_extra') : toNep(reasonRaw);
                const feeText = (document.getElementById('fee_s').value !== "0") ? `प्रदेश आर्थिक ऐन बमोजिमको राजस्व दस्तुर रू. <b>${v('fee_s')}</b>/- असुल गरि` : "";

                // पुर्जाको प्रकार
                let purjaType = "प्रतिलिपि जग्गाधनी प्रमाणपुर्जा";
                if (reasonRaw === 'पुरानो/झुत्रो भएको') purjaType = "पुरानो खिची नयाँ जग्गाधनी प्रमाणपुर्जा";

                const issueKittasFinal = state.issueKittas.length > 0 ? `कि.नं. <b>${toNep(formatList(state.issueKittas))}</b> को ${purjaType}` : "उल्लेखित कित्ताहरूको " + purjaType;

                const miNo = v('in_mn');
                const miDt = v('in_md');
                const miHtml = (miNo !== '.......' || miDt !== '.......') ? `मि.नं.: ${miNo} मिति: ${miDt}` : '';

                // update() फङ्सन भित्र यो भाग सच्याउनुहोस्
                let settings = {
                    gov: "नेपाल सरकार",
                    ministry: "भूमि व्यवस्था, सहकारी तथा गरिबी निवारण मन्त्रालय",
                    dept: "भूमि व्यवस्थापन तथा अभिलेख विभाग",
                    office: "मालपोत कार्यालय",
                    addr: "चौतारा, सिन्धुपाल्चोक",
                    def_dist: "सिन्धुपाल्चोक" // यहाँ जिल्लाको नाम थप्नुहोस्
                };
                const savedSettings = localStorage.getItem('global_office_settings');
                if (savedSettings) settings = JSON.parse(savedSettings);

        function resetAll() { if (confirm("डाटा मेटाउने?")) { localStorage.removeItem('copy_tp_v2'); location.reload(); } }
        function saveState() {
            const inputs = {};
            document.querySelectorAll('.input-box, input[type="checkbox"], select').forEach(el => { if (el.id) inputs[el.id] = el.type === 'checkbox' ? el.checked : el.value; });
            localStorage.setItem('copy_tp_v2', JSON.stringify({ state, inputs }));
        }

        window.onload = () => {
            const saved = localStorage.getItem('copy_tp_v2');
            if (saved) {
                const d = JSON.parse(saved); state = d.state;
                for (let id in d.inputs) {
                    const el = document.getElementById(id);
                    if (el) { if (el.type === 'checkbox') el.checked = d.inputs[id]; else el.value = d.inputs[id]; }
                }
            }
            renderApps(); renderLands(); renderRokkaEntries(); renderKittaSelectors(); toggleMoth(); toggleRokka(); checkReason(); update();
        }

        function exportWord() {
            const content = document.getElementById('preview').innerHTML;
            const html = `<html><head><meta charset="utf-8"><style>body{font-family:'Mukta',sans-serif;} .doc-table{border-collapse:collapse; width:100%;} .doc-table th, .doc-table td{border:1px solid black; padding:5px; text-align:center;}</style></head><body>${content}</body></html>`;
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Tippani.doc`; a.click();
        }
    </script>
