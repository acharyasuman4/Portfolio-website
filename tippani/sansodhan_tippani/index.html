<!DOCTYPE html>
<html lang="ne">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संशोधन - टिप्पणी</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Mukta', sans-serif;
            background-color: #cbd5e1;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .input-panel {
            flex: 0 0 420px;
            background: white;
            padding: 15px;
            border-right: 1px solid #94a3b8;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 2px;
            color: #475569;
        }

        .input-box {
            border: 1px solid #94a3b8;
            padding: 5px;
            border-radius: 4px;
            width: 100%;
            font-size: 13px;
            font-family: 'Mukta', sans-serif;
            margin-bottom: 5px;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 12px;
            width: 100%;
            margin-top: 5px;
        }

        .btn-blue {
            background-color: #2563eb;
        }

        .btn-red {
            background-color: #ef4444;
        }

        .btn-green {
            background-color: #16a34a;
        }

        .btn-dark {
            background-color: #334155;
        }

        .preview-container {
            flex: 1;
            background: #94a3b8;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-page {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 1.5cm 1.27cm 1.5cm 2.54cm;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: justify;
            line-height: 1.5;
            font-size: 14pt;
            color: #000;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid black;
            margin-bottom: 15px;
        }

        .doc-table th,
        .doc-table td {
            border: 1px solid black;
            padding: 4px 8px;
            text-align: left;
            font-size: 12pt;
        }

.doc-table th {
    background-color: #f9f9f9;
    text-align: center;
    min-width: 100px; /* This ensures headers have a decent width */
}

        .item-list {
            background: #f1f5f9;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #cbd5e1;
        }

        .del-btn {
            color: red;
            cursor: pointer;
            font-weight: bold;
        }

/* Update these specific parts in your existing CSS */

@page {
    size: A4;
    /* Margins: Top (1.5cm), Right (0.5in), Bottom (1.5cm), Left (1.2in) */
    margin: 1.5cm 0.5in 1.5cm 1.2in;
}

@media print {
    /* Hide scrollbars and fix height */
    html, body {
        height: auto !important;
        overflow: visible !important;
        background: white !important;
    }

    .no-print {
        display: none !important;
    }

    .main-layout {
        display: block !important;
        height: auto !important;
    }

    .preview-container {
        display: block !important;
        overflow: visible !important;
        padding: 0 !important;
        background: white !important;
        height: auto !important;
    }

    .preview-page {
        box-shadow: none !important;
        border: none !important;
        width: 100% !important; /* Allow the @page margin to control width */
        min-height: auto !important;
        padding: 0 !important; /* Padding is handled by @page margin */
        margin: 0 !important;
        text-align: justify;
    }

    /* Prevent tables and paragraphs from breaking awkwardly across pages */
    .doc-table, p {
        page-break-inside: avoid;
    }
}

/* Adjust the screen preview to look closer to the print version */
.preview-page {
    background: white;
    width: 210mm;
    min-height: 297mm;
    /* Screen View Margins */
    padding: 1.5cm 0.5in 1.5cm 1.2in; 
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    text-align: justify;
    line-height: 1.5;
    font-size: 14pt;
    color: #000;
    box-sizing: border-box; /* Crucial for margin calculation */
}
    </style>
</head>

<body>

    <div class="main-layout">
        <div class="input-panel no-print">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 style="margin:0; font-size:1.1rem;">संशोधन टिप्पणी</h2>
                <button onclick="resetAll()" class="btn btn-red" style="width:auto; padding:4px 10px;">Reset</button>
            </div>

            <!-- File Info -->
            <div class="input-group">
                <div class="row-2">
                    <div><label>मि.नं.:</label><input type="text" id="in_mn" class="input-box" oninput="update()"></div>
                    <div><label>मिति:</label><input type="text" id="in_dt" class="input-box date-input"
                            oninput="update()"></div>
                </div>
                <div class="row-2">
                    <div><label>द.नं.:</label><input type="text" id="in_rn" class="input-box" oninput="update()"></div>
                    <div><label>द.मिति:</label><input type="text" id="in_rd" class="input-box date-input"
                            oninput="update()"></div>
                </div>
            </div>

            <!-- Applicant Section -->
            <div class="input-group" style="background:#eef2ff;">
                <label>१. निवेदक विवरण</label>
                <input type="text" id="app_name" placeholder="नाम थर" class="input-box">
                <div class="row-2">
                    <select id="app_type" class="input-box">
                        <option value="son">बाबु/बाजे तर्फ</option>
                        <option value="wife">पति/ससुरा तर्फ</option>
                    </select>
                    <input type="text" id="app_addr" placeholder="स्थायी ठेगाना" class="input-box">
                </div>
                <input type="text" id="app_f" placeholder="बाबु/पतिको नाम" class="input-box">

                <input type="text" id="app_gf" placeholder="बाजे/ससुराको नाम" class="input-box">
                <div style="font-size: 11px; margin-bottom: 5px; color: #1e40af;">
                    <input type="checkbox" id="sync_landowner" checked onchange="toggleLandownerFields()">
                    निवेदक र जग्गाधनी एउटै हो ।
                </div>
                <button onclick="addApp()" class="btn btn-blue">+ निवेदक थप्नुहोस्</button>
                <div id="list_apps"></div>
            </div>

            <!-- Landowner Section -->
            <div class="input-group" style="background:#fff1f2;" id="landowner_input_group">
                <label>जग्गाधनीको विवरण (साविक लगत बमोजिम):</label>
                <input type="text" id="in_landowner" placeholder="जग्गाधनीको नाम" class="input-box" oninput="update()">
                <div class="row-2">
                    <select id="l_owner_type" class="input-box" onchange="update()">
                        <option value="son">बाबु/बाजे तर्फ</option>
                        <option value="wife">पति/ससुरा तर्फ</option>
                    </select>
                    <input type="text" id="in_l_f" placeholder="बाबु/पतिको नाम" class="input-box" oninput="update()">
                </div>
                <input type="text" id="in_l_gf" placeholder="बाजे/ससुराको नाम" class="input-box" oninput="update()">
                <input type="text" id="in_l_addr" placeholder="ठेगाना" class="input-box" oninput="update()">
            </div>

            <!-- Land Details Section -->
            <div class="input-group" style="background:#f0fdf4;">
                <label>३. साविक जग्गा विवरण:</label>
                <div class="row-2">
                    <input type="text" id="l_vdc" placeholder="साविक गा.वि.स." class="input-box">
                    <input type="text" id="l_ward" placeholder="वडा" class="input-box">
                </div>
                <div class="row-2">
                    <input type="text" id="l_kitta" placeholder="कि.नं." class="input-box">
                    <div style="display:flex; gap:5px;">
                        <button onclick="addLand('same')" class="btn btn-green" style="flex:1;">Same VDC</button>
                        <button onclick="addLand('new')" class="btn btn-dark" style="flex:1;">New VDC</button>
                    </div>
                </div>
                <div id="area_inputs_container"></div>
                <div id="list_lands"></div>
            </div>

            <!-- Correction Section -->
            <div class="input-group" style="background:#fefce8;">
                <label>२. संशोधन हुने विवरण:</label>
<!-- Radio Buttons -->
<div style="display:flex; gap:10px; margin-bottom:8px; font-size:11px;">
    <label><input type="radio" name="c_type" value="owner" checked onclick="toggleCType()"> जग्गाधनीसँग</label>
    <label><input type="radio" name="c_type" value="land" onclick="toggleCType()"> जग्गासँग</label>
    <label><input type="radio" name="c_type" value="cit" onclick="toggleCType()"> नागरिकता सम्बन्धी</label>
</div>

<!-- Citizenship Fields with Auto-Mirroring -->
<div id="cit_correction_fields" style="display:none; border:1px solid #ddd; padding:8px; background:#fff;">
    <label style="font-size:10px; color:blue;">साविक भर्नुहोस् (कायममा आफै भरिनेछ, फरक मात्र सच्याउनुहोस्):</label>
    <div class="row-2">
        <input type="text" id="c_cit_no_old" placeholder="साविक ना.प्र.नं." class="input-box" oninput="mirrorCit('no')">
        <input type="text" id="c_cit_no_new" placeholder="कायम ना.प्र.नं." class="input-box">
    </div>
    <div class="row-2">
        <input type="text" id="c_cit_dt_old" placeholder="साविक जारी मिति" class="input-box date-input" oninput="mirrorCit('dt')">
        <input type="text" id="c_cit_dt_new" placeholder="कायम जारी मिति" class="input-box date-input">
    </div>
    <div class="row-2">
        <input type="text" id="c_cit_dist_old" placeholder="साविक जारी जिल्ला" class="input-box" oninput="mirrorCit('dist')">
        <input type="text" id="c_cit_dist_new" placeholder="कायम जारी जिल्ला" class="input-box">
    </div>
</div>
                <div id="owner_correction_fields">
                    <input type="text" id="c_topic" list="topic_list" class="input-box" placeholder="शिर्षक"
                        onchange="autoFillCorrection()">
                    <datalist id="topic_list"></datalist>
                    <div class="row-2">
                        <input type="text" id="c_old" placeholder="साविक" class="input-box">
                        <input type="text" id="c_new" placeholder="कायम" class="input-box">
                    </div>
                </div>

                <div id="land_correction_fields"
                    style="display:none; border:1px solid #ddd; padding:8px; background:#fff;">
                    <label style="font-size:10px; color:blue;">कित्ता छान्नुहोस् र सच्याउनुहोस्:</label>
                    <div id="kitta_edit_list" style="max-height:150px; overflow-y:auto; font-size:11px;"></div>
                </div>
                <div id="cit_correction_fields" style="display:none; border:1px solid #ddd; padding:8px; background:#fff;">
    <div class="row-2">
        <input type="text" id="c_cit_no_old" placeholder="साविक ना.प्र.नं." class="input-box">
        <input type="text" id="c_cit_no_new" placeholder="कायम ना.प्र.नं." class="input-box">
    </div>
    <div class="row-2">
        <input type="text" id="c_cit_dt_old" placeholder="साविक जारी मिति" class="input-box date-input">
        <input type="text" id="c_cit_dt_new" placeholder="कायम जारी मिति" class="input-box date-input">
    </div>
    <div class="row-2">
        <input type="text" id="c_cit_dist_old" placeholder="साविक जारी जिल्ला" class="input-box">
        <input type="text" id="c_cit_dist_new" placeholder="कायम जारी जिल्ला" class="input-box">
    </div>
</div>

                <button onclick="addCorrection()" class="btn btn-blue" style="margin-top:10px;">संशोधन
                    थप्नुहोस्</button>
                <div id="list_corrections"></div>
            </div>

            <!-- टिप्पणीको बीचको व्यहोरा (Moth Section) -->
            <div class="input-group" style="background:#fff7ed;">
                <label>मोठ/रोक्का व्यहोरा (सम्पादन गर्न सकिने):</label>
                <textarea id="in_moth" class="input-box" oninput="update()"
                    style="height: 50px; font-size: 12px;"></textarea>
                <button onclick="resetMoth()" class="btn btn-dark"
                    style="padding: 2px; font-size: 10px; width: auto; background: #94a3b8;">Default पुन:
                    राख्नुहोस्</button>
            </div>

            <!-- Recommendation/Final Info -->
            <div class="input-group">
                <div class="row-2">
                    <input type="text" id="in_loc" placeholder="स्थानीय तह" class="input-box" oninput="update()">
                    <input type="text" id="in_lw" placeholder="वडा नं." class="input-box" oninput="update()">
                </div>
                <div class="row-2">
                    <input type="text" id="in_sc" placeholder="सि.च.नं." class="input-box" oninput="update()">
                    <input type="text" id="in_sd" placeholder="सि.मिति" class="input-box date-input" oninput="update()">
                </div>
                <textarea id="in_extra" placeholder="थप व्यहोरा (सनाखत पछिको)..." class="input-box"
                    oninput="update()"></textarea>
            </div>

            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #cbd5e1;">
    <label style="margin: 0; display: flex; align-items: center; cursor: pointer;">
        <input type="checkbox" id="in_rev_chk" onchange="update()" checked style="margin-right: 5px;"> 
        राजश्व दस्तुर रु.
    </label>
    <input type="text" id="in_rev_amt" value="८००" class="input-box" style="width: 80px; margin: 0; height: 25px;" oninput="update()">
</div>

            <div class="row-2">
                <button onclick="window.print()" class="btn btn-blue">🖨️ Print</button>
                <button onclick="exportToWord()" class="btn btn-green">📄 Export to Word</button>
            </div>
        </div>

        <div class="preview-container">
            <div id="preview" class="preview-page"></div>
        </div>
    </div>

    <script>
        let state = { apps: [], lands: [], corrections: [] };
        const ownerTopics = ["नामथर", "बाबुको नाम", "बाजेको नाम", "पतिको नाम", "ससुराको नाम", "स्थायी ठेगाना"];

        // Auto-formatting and conversion
        document.addEventListener('input', e => {
            if (e.target.type === 'text' || e.target.tagName === 'TEXTAREA') {
                let start = e.target.selectionStart;
                let val = e.target.value.replace(/\d/g, d => "०१२३४५६७८९"[d]);
                if (e.target.classList.contains('date-input')) val = val.replace(/\./g, "।");
                if (e.target.value !== val) {
                    e.target.value = val;
                    e.target.setSelectionRange(start, start);
                }
            }
            update();
        });

        function toNep(num) { return num.toString().replace(/\d/g, d => "०१२३४५६७८९"[d]); }
        function nepJoin(arr) {
            if (!arr.length) return "";
            if (arr.length === 1) return arr[0];
            const last = arr.pop();
            return arr.join(', ') + ' र ' + last;
        }

        function toggleLandownerFields() {
            const isSynced = document.getElementById('sync_landowner').checked;
            const group = document.getElementById('landowner_input_group');
            group.style.opacity = isSynced ? "0.6" : "1";
            group.style.pointerEvents = isSynced ? "none" : "auto";
        }
        function mirrorCit(field) {
    const oldVal = document.getElementById(`c_cit_${field}_old`).value;
    document.getElementById(`c_cit_${field}_new`).value = oldVal;
    update();
}

        function addApp() {
            const name = document.getElementById('app_name').value;
            const f = document.getElementById('app_f').value;
            const gf = document.getElementById('app_gf').value;
            const addr = document.getElementById('app_addr').value;
            const type = document.getElementById('app_type').value;
            if (!name) return;
            state.apps.push({ name, f, gf, addr, type });

            if (document.getElementById('sync_landowner').checked) {
                const syncUnique = (id, next) => {
                    let current = document.getElementById(id).value;
                    if (!current || current === ".......") return next;
                    let list = current.split(', ');
                    if (!list.includes(next)) list.push(next);
                    return list.join(', ');
                };
                document.getElementById('in_landowner').value = syncUnique('in_landowner', name);
                document.getElementById('in_l_f').value = syncUnique('in_l_f', f);
                document.getElementById('in_l_gf').value = syncUnique('in_l_gf', gf);
                document.getElementById('in_l_addr').value = syncUnique('in_l_addr', addr);
                document.getElementById('l_owner_type').value = type;
            }
            document.getElementById('app_name').value = "";
            document.getElementById('app_f').value = "";
            document.getElementById('app_gf').value = "";
            update();
        }

        function addLand(mode) {
            const vdc = document.getElementById('l_vdc').value;
            const ward = document.getElementById('l_ward').value;
            const kitta = document.getElementById('l_kitta').value;
            if (!kitta) return;
            let match = state.lands.find(x => x.vdc === vdc && x.ward === ward);
            if (match) { if (!match.ks.includes(kitta)) match.ks.push(kitta); }
            else { state.lands.push({ vdc, ward, ks: [kitta], areas: {} }); }
            if (mode === 'new') { document.getElementById('l_vdc').value = ""; document.getElementById('l_ward').value = ""; }
            document.getElementById('l_kitta').value = "";
            renderAreaInputs();
            update();
        }

        function renderAreaInputs() {
            let html = `<label style="font-size:10px; color:blue;">क्षेत्रफल भर्नुहोस्:</label>`;
            state.lands.forEach((l, lIdx) => {
                l.ks.forEach(k => {
                    html += `<div style="display:flex; gap:5px; margin-bottom:2px;">
                    <span style="font-size:11px;">${l.vdc}, ${k}:</span>
                    <input type="text" class="input-box" style="margin:0; height:20px;" placeholder="क्षेत्रफल" 
                    value="${l.areas[k] || ''}" oninput="state.lands[${lIdx}].areas['${k}']=this.value; update();">
                </div>`;
                });
            });
            document.getElementById('area_inputs_container').innerHTML = html;
            if (document.querySelector('input[name="c_type"]:checked').value === 'land') renderLandCorrectionUI();
        }

function toggleCType() {
    const type = document.querySelector('input[name="c_type"]:checked').value;
    document.getElementById('owner_correction_fields').style.display = (type === 'owner' ? 'block' : 'none');
    document.getElementById('land_correction_fields').style.display = (type === 'land' ? 'block' : 'none');
    document.getElementById('cit_correction_fields').style.display = (type === 'cit' ? 'block' : 'none');
    document.getElementById('topic_list').innerHTML = ownerTopics.map(t => `<option value="${t}">`).join('');
    if (type === 'land') renderLandCorrectionUI();
}

        function renderLandCorrectionUI() {
            let html = "";
            state.lands.forEach((l) => {
                l.ks.forEach(k => {
                    const area = l.areas[k] || "";
                    html += `<div style="border-bottom:1px solid #eee; padding:5px 0;">
                    <label><input type="checkbox" class="land-corr-chk" data-vdc="${l.vdc}" data-ward="${l.ward}" data-kitta="${k}" data-area="${area}"> कि.नं. ${k}</label>
                    <div class="land-edit-inputs" style="display:none; grid-template-columns: 1fr 1fr 1fr 1fr; gap:3px; margin-top:3px;">
                        <input type="text" value="${l.vdc}" class="input-box new-vdc">
                        <input type="text" value="${l.ward}" class="input-box new-ward">
                        <input type="text" value="${k}" class="input-box new-kitta">
                        <input type="text" value="${area}" class="input-box new-area">
                    </div>
                </div>`;
                });
            });
            document.getElementById('kitta_edit_list').innerHTML = html || "साविक जग्गा थप्नुहोस्।";
            document.querySelectorAll('.land-corr-chk').forEach(chk => {
                chk.onchange = function () { this.parentElement.nextElementSibling.style.display = this.checked ? 'grid' : 'none'; };
            });
        }

function addCorrection() {
    const type = document.querySelector('input[name="c_type"]:checked').value;
    
    if (type === 'owner') {
        const topic = document.getElementById('c_topic').value;
        const oldV = document.getElementById('c_old').value;
        const newV = document.getElementById('c_new').value;
        if (!topic) return;
        state.corrections.push({ type, topic, oldV, newV });
    } 
    else if (type === 'cit') {
        const checks = [
            { id: 'no', topic: 'नागरिकता नं.' },
            { id: 'dt', topic: 'नागरिकताको जारी मिति' },
            { id: 'dist', topic: 'नागरिकताको जारी जिल्ला' }
        ];
        checks.forEach(item => {
            const ov = document.getElementById(`c_cit_${item.id}_old`).value;
            const nv = document.getElementById(`c_cit_${item.id}_new`).value;
            // Only add to state if the value is actually different
            if (ov !== nv && ov !== "") {
                state.corrections.push({ type: 'cit', topic: item.topic, field: item.id, oldV: ov, newV: nv });
            }
        });
    } 
    else if (type === 'land') {
        document.querySelectorAll('.land-corr-chk:checked').forEach(chk => {
            const row = chk.parentElement.nextElementSibling;
            state.corrections.push({
                type: 'land', topic: 'जग्गा विवरण',

        function autoFillCorrection() {
            const topic = document.getElementById('c_topic').value;
            if (state.apps.length > 0) {
                const app = state.apps[0];
                if (topic === "नामथर") { document.getElementById('c_old').value = document.getElementById('in_landowner').value; document.getElementById('c_new').value = app.name; }
                else if (topic.includes("बाबु") || topic.includes("पति")) { document.getElementById('c_old').value = document.getElementById('in_l_f').value; document.getElementById('c_new').value = app.f; }
                else if (topic.includes("बाजे") || topic.includes("ससुरा")) { document.getElementById('c_old').value = document.getElementById('in_l_gf').value; document.getElementById('c_new').value = app.gf; }
                else if (topic === "स्थायी ठेगाना") { document.getElementById('c_old').value = document.getElementById('in_l_addr').value; document.getElementById('c_new').value = app.addr; }
            }
        }

                    sons.forEach((x, i) => nivedakTableHtml += `<tr><td style="text-align:center">${toNep(i + 1)}</td><td>${x.name}</td><td>${x.f}</td><td>${x.gf}</td></tr>`);
                }
                if (wives.length > 0) {
                    nivedakTableHtml += `<tr><th>सि.नं.</th><th>निवेदकको नाम थर</th><th>पतिको नाम</th><th>ससुराको नाम</th></tr>`;
                    wives.forEach((x, i) => nivedakTableHtml += `<tr><td style="text-align:center">${toNep(sons.length + i + 1)}</td><td>${x.name}</td><td>${x.f}</td><td>${x.gf}</td></tr>`);
                }
                nivedakTableHtml += `</tbody></table>`;
            }

            // Logic for जग्गा vs जग्गाहरू
            const totalKittas = state.lands.reduce((acc, land) => acc + land.ks.length, 0);
            const landNoun = totalKittas > 1 ? "जग्गाहरू" : "जग्गा";
            const landNounGenitive = totalKittas > 1 ? "जग्गाहरूको" : "जग्गाको";
            // --- Moth/Rokkka Logic Start ---
            const mothEl = document.getElementById('in_moth');
            const defaultMoth = `उल्लिखित कित्ता ${landNounGenitive} मोठ कायम रहेको र रोक्का नरहेको भनी सम्बन्धित फाँटबाट भिडी आएको ।`;

            // If the box is empty, fill with default
            if (!mothEl.value.trim()) {
                mothEl.value = defaultMoth;
            }
            const currentMothText = mothEl.value;
            // --- Moth/Rokkka Logic End ---

            const landDetailsStr = state.lands.map(l => {
                const kittaStr = l.ks.map(k => k + (l.areas[k] ? ` (${l.areas[k]})` : ""));
                return `साविक <b>${l.vdc} ${l.ward}</b> को कि.नं. <b>${nepJoin(kittaStr)}</b>`;
            }).join(' र ');

            const landownerName = v('in_landowner');
            const uniqueTopics = [...new Set(state.corrections.map(c => c.topic))];
            const topicText = uniqueTopics.length > 0 ? nepJoin(uniqueTopics) : "विवरण";

            // Generate Table Rows (Smart Bold)
// Helper to bold only if changed
    const bDiff = (o, n) => (o !== n && n !== "" ? `<b>${n}</b>` : n);

    let correctionRows = "";

    // 1. Owner Rows (Always in Table)
    const ownerRows = [
        { label: "नामथर", old: v('in_landowner') },
        { label: (document.getElementById('l_owner_type').value === 'son' ? "बाबुको नाम" : "पतिको नाम"), old: v('in_l_f') },
        { label: (document.getElementById('l_owner_type').value === 'son' ? "बाजेको नाम" : "ससुराको नाम"), old: v('in_l_gf') },
                { label: "स्थायी ठेगाना", old: v('in_l_addr') } // Added this line

    ];
    ownerRows.forEach(row => {
        const corr = state.corrections.find(c => c.type === 'owner' && c.topic === row.label);
        correctionRows += `<tr><td>${row.label}: ${row.old}</td><td>${corr ? `<b>${corr.newV}</b>` : "ऐ."}</td></tr>`;
    });

    // 2. Citizenship Row (Always in Table if Old No exists)
    const citOld = { no: v('c_cit_no_old'), dt: v('c_cit_dt_old'), ds: v('c_cit_dist_old') };
    const citNew = { no: v('c_cit_no_new'), dt: v('c_cit_dt_new'), ds: v('c_cit_dist_new') };
    
    if (citOld.no !== ".......") {
        const isChanged = (citOld.no !== citNew.no || citOld.dt !== citNew.dt || citOld.ds !== citNew.ds);
        let newColContent = "ऐ.";
        if (isChanged) {
            newColContent = `ना.प्र.नं./जारी मितिः ${bDiff(citOld.no, citNew.no)} (${bDiff(citOld.ds, citNew.ds)}) / ${bDiff(citOld.dt, citNew.dt)}`;
        }
        correctionRows += `<tr><td>ना.प्र.नं./जारी मितिः ${citOld.no} (${citOld.ds}) / ${citOld.dt}</td><td>${newColContent}</td></tr>`;
    }

// 3. Land Rows (Grouped for cleanliness, Individual if corrected)
    state.lands.forEach(l => {
        // Check if any kitta in this VDC/Ward has a registered correction
        const correctedInThisGroup = state.corrections.filter(c => 
            c.type === 'land' && c.old.vdc === l.vdc && c.old.ward === l.ward
        );

        if (correctedInThisGroup.length === 0) {
            // OPTION A: Grouped row (No individual plot changes, just owner/cit correction)
            const kittaDisplayList = l.ks.map(k => {
                const area = l.areas[k] ? ` (${l.areas[k]})` : ""; // Remove brackets if area is empty
                return `<b>${k}</b>${area}`;
            }).join(', ');

            correctionRows += `<tr>
                <td>साविक <b>${l.vdc}-${l.ward}</b> कि.नं. ${kittaDisplayList}</td>
                <td>ऐ.</td>
            </tr>`;
        } else {
            // OPTION B: Individual rows (Specific plots are being corrected/split/resized)
            l.ks.forEach(k => {
                const area = l.areas[k] ? ` (${l.areas[k]})` : ""; 
                const corr = correctedInThisGroup.find(c => c.old.kitta === k);
                
                let oldCell = `साविक <b>${l.vdc}-${l.ward}</b> कि.नं. <b>${k}</b>${area}`;
                let newCell = "ऐ.";
                
                if (corr) {
                    // Smart Bolding helper for internal values
                    const b = (o, n) => (o !== n && n !== "" ? `<b>${n}</b>` : n);
                    const nArea = corr.new.area ? ` (${b(corr.old.area, corr.new.area)})` : "";
                    
                    newCell = `${b(corr.old.vdc, corr.new.vdc)}-${b(corr.old.ward, corr.new.ward)} कि.नं. ${b(corr.old.kitta, corr.new.kitta)}${nArea}`;
                }
                correctionRows += `<tr><td>${oldCell}</td><td>${newCell}</td></tr>`;
            });
        }
    });
    const revChk = document.getElementById('in_rev_chk').checked;
const revAmt = v('in_rev_amt');
const rajaswo = revChk 
    ? `प्रदेश आर्थिक ऐन बमोजिम संशोधन दस्तुर रु. <b>${revAmt}/-</b> असुल गरि` 
    : ``;

                            // सनाखत पछिको अतिरिक्त व्यहोरा छ कि छैन चेक गर्ने
            const extraInputVal = document.getElementById('in_extra')?.value.trim();
            const extraTextPart = extraInputVal ? `साथै ${extraInputVal}को` : "";

            const correctionTableHtml = `<table class="doc-table"><thead><tr><th style="width:50%">जग्गाधनी श्रेस्ताको विवरण</th><th style="width:50%">संशोधन भई कायम हुनुपर्ने विवरण</th></tr></thead><tbody>${correctionRows || '<tr><td colspan="2" style="text-align:center">संशोधन विवरण थप्नुहोस्</td></tr>'}</tbody></table>`;

            const bodyTextHtml = `
            <p style="text-indent:1px; margin-top:2px;">श्रीमान्,</p>
            <p style="text-indent:50px; margin-top:2px;">${settings.def_dist} जिल्ला ${landDetailsStr} <b>${landownerName}</b>को नाममा दर्ता रहेकोमा सो ${landNounGenitive} दर्ता श्रेस्ता र पुर्जामा ${topicText} संशोधन गरिपाउँ भनी ${state.apps.length > 1 ? "निवेदकहरू" : "निवेदक"}को द.नं. <b>${v('in_rn')}</b> मिति <b>${v('in_rd')}</b> को निवेदन ।</p>
            <p style="text-indent:0px;">${currentMothText} जग्गाधनी दर्ता श्रेस्तामा रहेको र संशोधन भई कायम हुनुपर्ने विवरणहरू देहाय बमोजिम रहेको ।</p>
            ${correctionTableHtml} 
            <p style="text-indent:0px;">माग भए बमोजिम संशोधन गरिदिनका लागि <b>${v('in_loc')}</b> <b>${v('in_lw')}</b> नं. वडा कार्यालयको च.नं. ${v('in_sc')} मिति ${v('in_sd')} को सिफारिस, नागरिकता प्रमाणपत्र र सनाखतको ${extraTextPart} आधारमा ${rajaswo} माग भएबमोजिम <b>${topicText}</b> संशोधन हुन आवश्यक निर्णयार्थ पेश ।</p>
        `;

            document.getElementById('preview').innerHTML = headerHtml + nivedakTableHtml + bodyTextHtml;

            // Auto Save
            const allInputs = {};
            document.querySelectorAll('.input-box, textarea').forEach(el => { if (el.id) allInputs[el.id] = el.value; });
            localStorage.setItem('land_doc_persistence_v2', JSON.stringify({ state, inputs: allInputs, sync: document.getElementById('sync_landowner').checked }));
        }

        function loadSavedData() {
            const saved = localStorage.getItem('land_doc_persistence_v2');
            if (!saved) return;
            const data = JSON.parse(saved);
            state = data.state;
            document.getElementById('sync_landowner').checked = data.sync;
            for (const id in data.inputs) { const el = document.getElementById(id); if (el) el.value = data.inputs[id]; }
            renderAreaInputs();
            toggleLandownerFields();
            update();
        }

        function exportToWord() {
            // १. प्रिभ्युमा भएको सामग्री तान्ने
            const content = document.getElementById('preview').innerHTML;

            // २. माइक्रोसफ्ट वर्डको लागि आवश्यक Header र CSS स्टाइल तयार गर्ने
            const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' 
            xmlns:w='urn:schemas-microsoft-com:office:word' 
            xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'>
            <style>
                body { font-family: 'Mukta', 'Arial', sans-serif; font-size: 14pt; }
                .doc-table { width: 100%; border-collapse: collapse; border: 1pt solid black; margin-bottom: 15px; }
                .doc-table th, .doc-table td { border: 1pt solid black; padding: 5px; text-align: left; font-size: 12pt; }
                .doc-table th { background-color: #f0f0f0; }
                p { margin: 10pt 0; text-align: justify; line-height: 1.5; }
                b { font-weight: bold; }
            </style>
            </head><body>`;

            const footer = "</body></html>";
            const sourceHTML = header + content + footer;

            // ३. Blob फाइल बनाउने (Nepali Unicode सुरक्षित राख्न UTF-8)
            const blob = new Blob(['\ufeff', sourceHTML], {
                type: 'application/msword'
            });

            // ४. डाउनलोड लिंक बनाउने र क्लिक गर्ने
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;

            // फाइलको नाम मिति अनुसार राख्ने
            const fileName = `संशोधन_टिप्पणी_${document.getElementById('app_name').value || 'Doc'}.doc`;
            link.download = fileName;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function resetAll() { if (confirm("सबै विवरण मेटाउने?")) { localStorage.removeItem('land_doc_persistence_v2'); state = { apps: [], lands: [], corrections: [] }; location.reload(); } }

        window.onload = () => { toggleLandownerFields(); toggleCType(); loadSavedData(); };
    </script>
</body>
