    <script>
        const SQM_PER_ROPANI = 508.74;
        let currentMode = 'rapd';
        let historyData = JSON.parse(localStorage.getItem('min_val_history')) || [];
        let isMatchFound = false;

        // १. इन्डेक्सिङ र अटो-फिल लजिक
        function checkAutoFill() {
            const w = document.getElementById('wadaNo').value;
            const k = document.getElementById('kittaNo').value;
            
            if(!w || !k) { clearAutoFields(); return; }

            const match = historyData.find(h => h.wada == w && h.kitta == k);
            if(match) {
                document.getElementById('ratePerRopani').value = match.rate;
                document.getElementById('batoType').value = match.bato;
                document.getElementById('vargikaran').value = match.vargikaran || 'आवासीय';
                document.getElementById('ratePerRopani').style.backgroundColor = "#ecfdf5";
                isMatchFound = true;
            } else {
                clearAutoFields();
                isMatchFound = false;
            }
        }

        function clearAutoFields() {
            document.getElementById('ratePerRopani').value = '';
            document.getElementById('batoType').value = '';
            document.getElementById('ratePerRopani').style.backgroundColor = "";
        }

        // २. हिसाब गर्ने लजिक
        function calculate() {
            const wada = document.getElementById('wadaNo').value;
            const kitta = document.getElementById('kittaNo').value;
            const rateInput = document.getElementById('ratePerRopani').value;
            const rate = parseFloat(rateInput);
            const bato = document.getElementById('batoType').value;
            const vargikaran = document.getElementById('vargikaran').value;

            if(!wada || !kitta || isNaN(rate)) {
                alert("वडा, कित्ता र दररेट अनिवार्य छ!");
                return;
            }

            let areaRopani = 0, areaDesc = "";
            if(currentMode === 'rapd') {
                const r = parseFloat(document.getElementById('ropani').value) || 0;
                const a = parseFloat(document.getElementById('aana').value) || 0;
                const p = parseFloat(document.getElementById('paisa').value) || 0;
                const d = parseFloat(document.getElementById('daam').value) || 0;
                areaRopani = r + (a/16) + (p/64) + (d/256);
                areaDesc = `${r}-${a}-${p}-${d}`;
            } else {
                const sqm = parseFloat(document.getElementById('sqmeter').value) || 0;
                areaRopani = sqm / SQM_PER_ROPANI;
                areaDesc = `${sqm}m²`;
            }

            const valuation = Math.ceil(areaRopani * rate);
            historyData.unshift({ wada, kitta, areaDesc, rate, bato, vargikaran, valuation });
            localStorage.setItem('min_val_history', JSON.stringify(historyData));

            renderHistory();
            updateDataLists();
            
            // क्लियर गर्ने र फोकस गर्ने
            ['wadaNo','kittaNo','ropani','aana','paisa','daam','sqmeter','ratePerRopani','batoType'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('wadaNo').focus();
        }

        // ३. डिस्प्ले र यूआई फङ्सनहरू
        function renderHistory() {
            const container = document.getElementById('history-list');
            let html = '', grandTotal = 0;
            historyData.forEach((item, index) => {
                grandTotal += item.valuation;
                html += `
                    <div class="bg-slate-50 p-4 rounded-2xl border relative group transition-all">
                        <button onclick="deleteItem(${index})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                            <i data-lucide="x-circle" class="w-5 h-5"></i>
                        </button>
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase">कि.नं. ${item.kitta} (वडा ${item.wada})</p>
                                <p class="text-sm font-bold text-slate-800">${item.areaDesc} | ${item.bato}</p>
                            </div>
                            <p class="text-blue-600 font-bold text-lg">रु. ${toNepali(item.valuation)}</p>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || '<p class="text-center text-slate-400 mt-10">No records.</p>';
            document.getElementById('grandTotal').innerText = toNepali(grandTotal);
            lucide.createIcons();
        }

// १. लिस्ट देखाउने "Smart Trigger"
function setupListTrigger(inputId) {
    const input = document.getElementById(inputId);
    
    // क्लिक गर्दा वा फोकस हुँदा लिस्ट देखाउने
    input.addEventListener('focus', function() {
        this.setAttribute('placeholder', 'टाइप गर्नुहोस् वा छान्नुहोस्...');
    });

    // स्पेस थिच्दा वा खाली हुँदा पनि लिस्ट देखाउन मद्दत गर्ने सानो ट्रिक
    input.addEventListener('mousedown', function() {
        if(this.value === '') this.value = ' '; 
        setTimeout(() => { if(this.value === ' ') this.value = ''; }, 1);
    });
}

// २. रेट र बाटोको लिस्ट अपडेट गर्ने फङ्सन (सुधारिएको)
function updateDataLists() {
    const rateList = document.getElementById('rateList');
    const batoList = document.getElementById('batoList');
    
    if(!rateList || !batoList) return;

    // युनिक दररेट र बाटोहरू (History बाट)
    const uniqueRates = [...new Set(historyData.map(item => item.rate))].sort((a,b) => b-a);
    const uniqueBato = [...new Set(historyData.map(item => item.bato))];

    // रेट लिस्ट भर्ने
    rateList.innerHTML = uniqueRates.map(r => `<option value="${r}">`).join('');
    
    // बाटो लिस्ट भर्ने (डिफल्ट बाटोहरू सहित)
    const defaultBato = ['गोरेटो बाटो', 'कच्ची मोटर बाटो', 'पक्कि मोटर बाटो', 'नभएको'];
    const finalBato = [...new Set([...defaultBato, ...uniqueBato])];
    batoList.innerHTML = finalBato.map(b => `<option value="${b}">`).join('');
}

// ३. अफलाइनका लागि Service Worker रजिस्टर गर्ने
// यो कोड सबै पेज (Malpot, Kutabali, Tippani आदि) मा राख्नुहोस्
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // यहाँ './sw.js' को सट्टा '/sw.js' (Root Path) प्रयोग गर्नुहोला 
        // जसले गर्दा फोल्डर भित्रबाट पनि यसले मेन फाइल भेट्छ
        navigator.serviceWorker.register('/sw.js')
            .then(reg => {
                console.log('Service Worker Registered for this page!');
                
                // नयाँ अपडेट चेक गर्ने लजिक
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('नयाँ अपडेट उपलब्ध छ! कृपया पेज रिलोड गर्नुहोस्।');
                        }
                    };
                };
            })
            .catch(err => console.log('Service Worker Registration Failed:', err));
    });
}

// विन्डो लोड हुँदा सबै सेटअप गर्ने
window.onload = () => {
    renderHistory();
    updateDataLists();
    setupListTrigger('batoType');
    setupListTrigger('ratePerRopani');
    lucide.createIcons();
};
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('t-rapd').className = mode === 'rapd' ? 'active-mode pb-1 border-b-2 border-blue-600' : 'text-slate-400 pb-1';
            document.getElementById('t-sqm').className = mode === 'sqm' ? 'active-mode pb-1 border-b-2 border-blue-600' : 'text-slate-400 pb-1';
            document.getElementById('area-rapd').classList.toggle('hidden', mode !== 'rapd');
            document.getElementById('area-sqm').classList.toggle('hidden', mode !== 'sqm');
        }

        function toNepali(num) { return Math.floor(num).toString().replace(/\d/g, d => "०१२३४५६७८९"[d]); }
        function deleteItem(i) { historyData.splice(i, 1); localStorage.setItem('min_val_history', JSON.stringify(historyData)); renderHistory(); }
        function clearHistory() { if(confirm("सबै मेटाउने?")) { historyData = []; localStorage.removeItem('min_val_history'); renderHistory(); } }

        // ४. इभेन्ट लिसनर्स
        document.getElementById('wadaNo').addEventListener('input', checkAutoFill);
        document.getElementById('kittaNo').addEventListener('input', checkAutoFill);
        document.addEventListener('keydown', (e) => { if(e.key === 'Enter' && e.target.tagName === 'INPUT') calculate(); });

        window.onload = () => { renderHistory(); updateDataLists(); lucide.createIcons(); };

        function toggleMenu() {
    // मोबाइल स्क्रीनमा मात्र मेनु टगल गर्ने
    if (window.innerWidth <= 768) {
        const sidebar = document.getElementById('sidebar-menu');
        sidebar.classList.toggle('open');
    }
}
    </script>
